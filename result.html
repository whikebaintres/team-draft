<title>결과 확인</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --bg-alt: #f5f5f7;
    --panel: #f5f5f7;
    --panel-2: #ffffff;
    --line: #d2d2d7;
    --ink: #1d1d1f;
    --ink-dim: #6e6e73;
    --ink-faint: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30;
    --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d;
    --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a;
    --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-border: rgba(255, 255, 255, 0.7);
    --font-body: "Roboto", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #000000;
      --bg-alt: #1d1d1f;
      --panel: #1d1d1f;
      --panel-2: #161617;
      --line: #38383a;
      --ink: #f5f5f7;
      --ink-dim: #a1a1a6;
      --ink-faint: #6e6e73;
      --accent: #2997ff;
      --accent-hover: #52aeff;
      --accent-soft: rgba(41, 151, 255, 0.14);
      --danger: #ff453a;
      --danger-soft: rgba(255, 69, 58, 0.16);
      --good: #32d74b;
      --good-soft: rgba(50, 215, 75, 0.14);
      --warn: #ffb340;
      --warn-soft: rgba(255, 179, 64, 0.14);
      --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
      --wash:
        radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
        radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
        radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
      --glass-bg: rgba(30, 30, 32, 0.55);
      --glass-border: rgba(255, 255, 255, 0.09);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #000000; --bg-alt: #1d1d1f; --panel: #1d1d1f; --panel-2: #161617; --line: #38383a;
    --ink: #f5f5f7; --ink-dim: #a1a1a6; --ink-faint: #6e6e73;
    --accent: #2997ff; --accent-hover: #52aeff; --accent-soft: rgba(41, 151, 255, 0.14);
    --danger: #ff453a; --danger-soft: rgba(255, 69, 58, 0.16);
    --good: #32d74b; --good-soft: rgba(50, 215, 75, 0.14);
    --warn: #ffb340; --warn-soft: rgba(255, 179, 64, 0.14);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
    --glass-bg: rgba(30, 30, 32, 0.55); --glass-border: rgba(255, 255, 255, 0.09);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #ffffff; --bg-alt: #f5f5f7; --panel: #f5f5f7; --panel-2: #ffffff; --line: #d2d2d7;
    --ink: #1d1d1f; --ink-dim: #6e6e73; --ink-faint: #86868b;
    --accent: #0071e3; --accent-hover: #0077ed; --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30; --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d; --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a; --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background-color: var(--bg);
    background-image: var(--wash);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: var(--font-body); cursor: pointer; }
  button:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 56px 24px 96px; }

  .hero { text-align: center; max-width: 560px; margin: 0 auto 40px; }
  .hero .eyebrow {
    display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4.5vw, 2.5rem); font-weight: 700; letter-spacing: -0.015em;
    line-height: 1.2; margin: 0 0 12px; text-wrap: balance;
  }
  .hero p { font-size: 1rem; line-height: 1.55; color: var(--ink-dim); margin: 0; text-wrap: balance; }
  .hero a { color: var(--accent); }

  .panel {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 26px;
    box-shadow: var(--shadow-soft);
  }
  .panel + .panel { margin-top: 16px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-dim); }
  .empty-state p { margin: 0 0 4px; }

  .draft-meta {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 12px;
  }

  /* 년월 선택 패널 */
  .select-panel { display: flex; flex-direction: column; gap: 8px; }
  .select-label {
    font-size: 0.78rem; font-weight: 700; color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .month-select {
    font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; color: var(--ink);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; width: 100%;
  }

  /* 팀 스코어보드 */
  .team-summary { display: flex; flex-direction: column; gap: 4px; }
  .team-summary-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 4px; border-top: 1px solid var(--line);
  }
  .team-summary-row:first-of-type { border-top: none; }
  .team-summary-row .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--team-color, var(--accent)); flex-shrink: 0; }
  .team-summary-row .team-name { font-size: 1rem; font-weight: 700; color: var(--team-color, var(--ink)); flex: 1; min-width: 0; }
  .team-summary-row .team-figure { text-align: right; }
  .team-summary-row .team-figure .value { font-size: 1.15rem; font-weight: 700; color: var(--ink); }
  .team-summary-row .team-figure .label { font-size: 0.68rem; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.03em; }

  /* 라운드별 결과 요약 (간단 표) */
  .round-summary { display: flex; flex-direction: column; }
  .round-summary-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 4px; border-top: 1px solid var(--line);
    font-size: 0.88rem;
  }
  .round-summary-row:first-of-type { border-top: none; }
  .round-summary-row .rs-label {
    flex: 0 0 52px; font-size: 0.7rem; font-weight: 700; color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .round-summary-row .rs-match {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    font-weight: 600; min-width: 0;
  }
  .round-summary-row .rs-side { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .round-summary-row .rs-side.win { color: var(--good); font-weight: 800; }
  .round-summary-row .rs-side.loss { color: var(--ink-faint); }
  .round-summary-row .rs-side.draw { color: var(--warn); font-weight: 700; }
  .round-summary-row .rs-sep { color: var(--ink-faint); font-size: 0.8rem; flex-shrink: 0; }

  .btn {
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
    border-radius: 10px; padding: 10px 18px; font-weight: 600; font-size: 0.9rem;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg-alt); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .submit-row { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 24px; }
  .submit-note { font-size: 0.82rem; color: var(--ink-faint); text-align: center; }

  @media (max-width: 480px) {
    .round-summary-row { flex-wrap: wrap; }
    .round-summary-row .rs-match { flex-basis: 100%; justify-content: flex-start; }
  }

  /* 최종 결과 모달 */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.55);
    padding: 20px;
    opacity: 0; transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; }
  .modal-box {
    position: relative;
    width: 100%; max-width: 420px;
    background: var(--panel-2);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 32px 26px 28px;
    box-shadow: 0 24px 64px -16px rgba(0, 0, 0, 0.4);
    text-align: center;
    transform: scale(0.94); transition: transform 0.2s;
    overflow: hidden;
  }
  .modal-overlay.show .modal-box { transform: scale(1); }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px; border-radius: 50%;
    border: none; background: var(--bg-alt); color: var(--ink-faint);
    font-size: 1rem; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--line); color: var(--ink); }
  .modal-title {
    font-size: 1.3rem; font-weight: 800; letter-spacing: -0.01em; margin: 0 0 24px;
  }

  .slot-stage { padding: 8px 0 4px; }
  .slot-window {
    display: inline-block; min-width: 180px; padding: 22px 20px;
    border-radius: 16px; background: var(--bg-alt); border: 1px solid var(--line);
  }
  .slot-value {
    font-size: 1.5rem; font-weight: 800; color: var(--accent);
    display: inline-block;
  }
  .slot-stage.settled .slot-window {
    background: var(--accent-soft); border-color: var(--accent);
    animation: slot-settle 0.5s ease;
  }
  @keyframes slot-settle {
    0% { transform: scale(1); }
    40% { transform: scale(1.14); }
    100% { transform: scale(1); }
  }

  .final-reveal { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .final-criteria {
    margin: 0; font-size: 0.76rem; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--ink-faint);
  }
  .final-team {
    margin: 2px 0 14px; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.01em; color: var(--ink);
  }
  .final-roster { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 22px; }
  .final-roster-chip {
    font-size: 0.84rem; font-weight: 600; padding: 6px 14px; border-radius: 999px;
    background: var(--bg-alt); color: var(--ink-dim); border: 1px solid var(--line);
  }
  .final-roster-chip.is-pom {
    background: linear-gradient(135deg, #ffd76a, #ff9f43);
    color: #5a3400; border-color: #ffb340; font-weight: 800;
  }

  .final-pom-box { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .pom-label {
    font-size: 0.74rem; font-weight: 800; letter-spacing: 0.12em; color: #ff9f43;
  }
  .pom-name {
    font-size: 2.1rem; font-weight: 900; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ffe08a, #ff9f43 60%, #ff6b6b);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: pom-pulse 1.1s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(255, 159, 67, 0.55));
  }
  @keyframes pom-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  .confetti-layer {
    position: absolute; top: 0; bottom: 0; width: 50%; pointer-events: none; overflow: hidden;
  }
  .confetti-layer.left { left: 0; }
  .confetti-layer.right { right: 0; }
  .confetti-piece {
    position: absolute; top: -12px; width: 8px; height: 14px; opacity: 0.95;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(320px) rotate(540deg); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>

<div class="wrap">
  <div class="hero">
    <span class="eyebrow">E스포츠 동호회</span>
    <h1>결과 확인</h1>
    <p id="heroSub">년월을 선택해 팀별 누적 점수와 라운드별 대결 결과를 확인하세요. <a href="gacha.html">드래프트 페이지</a> · <a href="admin.html">관리자 페이지</a></p>
  </div>

  <div id="monthPanel"></div>
  <div id="content"></div>
</div>

<script>
(function () {
  "use strict";

  var FIREBASE_URL = "https://team-draft-1ab3a-default-rtdb.firebaseio.com";
  var STATE_PATH = "/gachaState.json";

  var monthPanelEl = document.getElementById("monthPanel");
  var contentEl = document.getElementById("content");

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  var POSITION_NAMES = ["선봉전", "차봉전", "중견전", "부장전", "대장전"];
  function positionLabel(pairIndex, totalPairs) {
    var list;
    if (totalPairs === 4) {
      list = ["선봉전", "차봉전", "부장전", "대장전"];
    } else if (totalPairs >= 5 || totalPairs <= 0) {
      list = POSITION_NAMES;
    } else {
      list = POSITION_NAMES.slice(0, totalPairs - 1).concat("대장전");
    }
    return pairIndex < list.length ? list[pairIndex] : (pairIndex + 1) + "번째 대결";
  }

  function getQueryYearMonth() {
    try {
      var params = new URLSearchParams(window.location.search);
      return params.get("ym") || null;
    } catch (e) {
      return null;
    }
  }

  var stateData = null; // { playerStats, headToHead, drafts, latestDraft }
  var selectedYearMonth = getQueryYearMonth();
  var initialSelectionApplied = false;

  // drafts에 없는 년월(이 기능 도입 이전 데이터)은 latestDraft에서 폴백으로 병합해 보여준다.
  function collectDrafts(data) {
    var map = {};
    if (data && data.drafts) {
      Object.keys(data.drafts).forEach(function (k) { map[k] = data.drafts[k]; });
    }
    if (data && data.latestDraft && data.latestDraft.yearMonth && !map[data.latestDraft.yearMonth]) {
      map[data.latestDraft.yearMonth] = data.latestDraft;
    }
    return map;
  }

  function loadState() {
    contentEl.innerHTML = '<div class="empty-state"><p>불러오는 중…</p></div>';
    fetch(FIREBASE_URL + STATE_PATH + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (res) { return res.ok ? res.json() : null; })
      .then(function (data) {
        stateData = data || { playerStats: {}, headToHead: {}, drafts: {}, latestDraft: null };
        renderMonthPanel();
        renderContent();
      })
      .catch(function () {
        contentEl.innerHTML = '<div class="empty-state"><p>불러오기 실패. 새로고침해보세요.</p></div>';
      });
  }

  function renderMonthPanel() {
    var draftsMap = collectDrafts(stateData);
    var keys = Object.keys(draftsMap).sort(function (a, b) {
      return (draftsMap[b].createdAt || 0) - (draftsMap[a].createdAt || 0);
    });
    if (!keys.length) { monthPanelEl.innerHTML = ""; return; }

    // 최근 등록된 결과를 먼저 보여준다. ?ym= 쿼리로 특정 월이 지정된 경우 최초 1회만 그 값을 우선한다.
    if (!initialSelectionApplied) {
      initialSelectionApplied = true;
      if (!selectedYearMonth || keys.indexOf(selectedYearMonth) === -1) selectedYearMonth = keys[0];
    } else if (keys.indexOf(selectedYearMonth) === -1) {
      selectedYearMonth = keys[0];
    }

    var opts = keys.map(function (k) {
      var tag = draftsMap[k].scored ? " · 채점 완료" : " · 미채점";
      return '<option value="' + escapeHtml(k) + '"' + (k === selectedYearMonth ? " selected" : "") + '>' + escapeHtml(k) + tag + '</option>';
    }).join("");

    monthPanelEl.innerHTML =
      '<div class="panel select-panel"><label class="select-label" for="monthSelect">조회할 년월</label>' +
      '<select id="monthSelect" class="month-select">' + opts + '</select></div>';

    document.getElementById("monthSelect").addEventListener("change", function (e) {
      selectedYearMonth = e.target.value;
      renderContent();
    });
  }

  function computeTeamSummary(draft) {
    var results = draft.results || {};
    return draft.teams.map(function (team) {
      var totalScore = 0;
      team.members.forEach(function (m) {
        var r = results[m];
        if (r && typeof r.score === "number") totalScore += r.score;
      });
      var winPoints = 0;
      draft.pairs.forEach(function (pair) {
        var nameA = pair[0], nameB = pair[1];
        var rA = results[nameA], rB = results[nameB];
        if (!rA || !rB || !rA.outcome || !rB.outcome) return;
        var winnerName = rA.outcome === "win" ? nameA : (rB.outcome === "win" ? nameB : null);
        if (winnerName && team.members.indexOf(winnerName) !== -1) winPoints++;
      });
      return { team: team, totalScore: totalScore, winPoints: winPoints };
    });
  }

  function renderContent() {
    var draftsMap = collectDrafts(stateData);
    var draft = draftsMap[selectedYearMonth];
    if (!draft) {
      contentEl.innerHTML =
        '<div class="panel"><div class="empty-state">' +
        '<p>아직 확인할 결과가 없어요.</p>' +
        '<p><a href="gacha.html">드래프트 페이지</a>에서 먼저 팀을 뽑아주세요.</p>' +
        '</div></div>';
      return;
    }

    var summary = computeTeamSummary(draft);

    var html = '<p class="draft-meta">' + escapeHtml(draft.yearMonth) + ' 드래프트</p>';

    html += '<div class="panel team-summary">';
    summary.forEach(function (row) {
      html += '<div class="team-summary-row" style="--team-color:' + row.team.color + '">' +
        '<span class="dot"></span><span class="team-name">' + escapeHtml(row.team.name) + '</span>' +
        '<div class="team-figure"><div class="value">' + row.totalScore + '점</div><div class="label">누적 점수</div></div>' +
        '<div class="team-figure"><div class="value">' + row.winPoints + '승점</div><div class="label">승점</div></div>' +
        '</div>';
    });
    html += '</div>';

    html += '<div class="panel round-summary">';
    draft.pairs.forEach(function (pair, idx) {
      html += roundSummaryRow(pair, idx, draft.pairs.length, draft.results || {});
    });
    html += '</div>';

    var hasAnyScore = draft.results && Object.keys(draft.results).some(function (n) {
      return typeof draft.results[n].score === "number";
    });

    html += '<div class="submit-row"><button class="btn btn-primary" id="finalCheckBtn"' +
      (hasAnyScore ? "" : " disabled") + '>최종 결과 확인</button><span class="submit-note" id="finalCheckNote">' +
      (hasAnyScore ? "" : "admin.html에서 먼저 점수를 등록해주세요.") + '</span></div>';

    contentEl.innerHTML = html;
    if (hasAnyScore) {
      document.getElementById("finalCheckBtn").addEventListener("click", function () {
        openFinalModal(draft);
      });
    }
  }

  function roundSummaryRow(pair, idx, totalPairs, results) {
    var nameA = pair[0], nameB = pair[1];
    var rA = results[nameA] || {};
    var rB = results[nameB] || {};
    var label = positionLabel(idx, totalPairs);
    var scoreA = (typeof rA.score === "number") ? rA.score : "-";
    var scoreB = (typeof rB.score === "number") ? rB.score : "-";
    var clsA = rA.outcome === "win" ? "win" : rA.outcome === "loss" ? "loss" : rA.outcome === "draw" ? "draw" : "";
    var clsB = rB.outcome === "win" ? "win" : rB.outcome === "loss" ? "loss" : rB.outcome === "draw" ? "draw" : "";
    return '<div class="round-summary-row">' +
      '<span class="rs-label">' + escapeHtml(label) + '</span>' +
      '<span class="rs-match">' +
      '<span class="rs-side ' + clsA + '">' + escapeHtml(nameA) + ' ' + scoreA + '</span>' +
      '<span class="rs-sep">:</span>' +
      '<span class="rs-side ' + clsB + '">' + scoreB + ' ' + escapeHtml(nameB) + '</span>' +
      '</span></div>';
  }

  /* ---------------- 최종 결과 모달 (누적 점수 / 승점 슬롯 → POM 확정) ---------------- */

  function pickWinnerTeam(summary, criteria) {
    var key = criteria === "totalScore" ? "totalScore" : "winPoints";
    var best = summary[0];
    summary.forEach(function (row) {
      if (row[key] > best[key]) best = row;
    });
    return best;
  }

  function pickPomName(draft, team) {
    var results = draft.results || {};
    var best = null;
    var bestScore = -Infinity;
    team.members.forEach(function (m) {
      var r = results[m];
      var score = (r && typeof r.score === "number") ? r.score : -Infinity;
      if (score > bestScore) { bestScore = score; best = m; }
    });
    return best;
  }

  function openFinalModal(draft) {
    closeFinalModal();

    var overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.id = "finalModalOverlay";
    overlay.innerHTML =
      '<div class="modal-box">' +
      '<button class="modal-close" id="modalCloseBtn" aria-label="닫기">×</button>' +
      '<h2 class="modal-title">최종 결과</h2>' +
      '<div class="slot-stage" id="slotStage"><div class="slot-window"><span class="slot-value" id="slotValue">누적 점수</span></div></div>' +
      '<div class="final-reveal" id="finalReveal" hidden>' +
      '<p class="final-criteria" id="finalCriteriaLabel"></p>' +
      '<p class="final-team" id="finalTeamName"></p>' +
      '<div class="final-roster" id="finalRoster"></div>' +
      '<div class="final-pom-box"><span class="pom-label">POM</span><span class="pom-name" id="finalPomName"></span></div>' +
      '</div>' +
      '<div class="confetti-layer left" id="confettiLeft"></div>' +
      '<div class="confetti-layer right" id="confettiRight"></div>' +
      '</div>';
    document.body.appendChild(overlay);
    requestAnimationFrame(function () { overlay.classList.add("show"); });

    document.getElementById("modalCloseBtn").addEventListener("click", closeFinalModal);
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) closeFinalModal();
    });

    if (draft.finalResult) {
      renderFinalReveal(draft, draft.finalResult.criteria, draft.finalResult.teamName, draft.finalResult.pomName, false);
    } else {
      runSlotAndDecide(draft);
    }
  }

  function closeFinalModal() {
    var overlay = document.getElementById("finalModalOverlay");
    if (overlay) overlay.remove();
  }

  function runSlotAndDecide(draft) {
    var slotValueEl = document.getElementById("slotValue");
    var slotStageEl = document.getElementById("slotStage");
    var options = ["누적 점수", "승점"];
    var start = Date.now();
    var duration = 5000;

    function tick() {
      if (!document.getElementById("finalModalOverlay")) return; // 모달이 닫혔으면 중단
      var elapsed = Date.now() - start;
      slotValueEl.textContent = options[Math.floor(Math.random() * 2)];
      if (elapsed < duration) {
        var delay = 60 + (elapsed / duration) * 340;
        setTimeout(tick, delay);
      } else {
        var criteria = Math.random() < 0.5 ? "totalScore" : "winPoints";
        slotValueEl.textContent = criteria === "totalScore" ? "누적 점수" : "승점";
        slotStageEl.classList.add("settled");
        fireConfetti();
        setTimeout(function () {
          if (document.getElementById("finalModalOverlay")) finalizeAndSave(draft, criteria);
        }, 600);
      }
    }
    tick();
  }

  function fireConfetti() {
    var colors = ["#ff6b6b", "#ffd76a", "#2fb8c6", "#9b6bd6", "#3fae74", "#0071e3"];
    ["confettiLeft", "confettiRight"].forEach(function (id) {
      var layer = document.getElementById(id);
      if (!layer) return;
      for (var i = 0; i < 24; i++) {
        var piece = document.createElement("span");
        piece.className = "confetti-piece";
        piece.style.left = Math.random() * 100 + "%";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (0.9 + Math.random() * 0.7) + "s";
        piece.style.animationDelay = (Math.random() * 0.3) + "s";
        layer.appendChild(piece);
        (function (el) {
          setTimeout(function () { el.remove(); }, 2000);
        })(piece);
      }
    });
  }

  function renderFinalReveal(draft, criteria, teamName, pomName, celebrate) {
    var slotStageEl = document.getElementById("slotStage");
    if (slotStageEl) slotStageEl.hidden = true;
    var reveal = document.getElementById("finalReveal");
    if (!reveal) return;
    reveal.hidden = false;
    document.getElementById("finalCriteriaLabel").textContent = (criteria === "totalScore" ? "누적 점수" : "승점") + " 기준 우승팀";
    document.getElementById("finalTeamName").textContent = teamName;

    var team = draft.teams.filter(function (t) { return t.name === teamName; })[0] || { members: [] };
    document.getElementById("finalRoster").innerHTML = team.members.map(function (m) {
      return '<span class="final-roster-chip' + (m === pomName ? " is-pom" : "") + '">' + escapeHtml(m) + '</span>';
    }).join("");
    document.getElementById("finalPomName").textContent = pomName || "-";

    if (celebrate) fireConfetti();
  }

  async function finalizeAndSave(draft, criteria) {
    var summary = computeTeamSummary(draft);
    var winnerRow = pickWinnerTeam(summary, criteria);
    var pomName = pickPomName(draft, winnerRow.team);

    renderFinalReveal(draft, criteria, winnerRow.team.name, pomName, false);

    try {
      var res = await fetch(FIREBASE_URL + STATE_PATH + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) return;
      var fresh = await res.json();
      if (!fresh) return;

      var draftsMap = collectDrafts(fresh);
      var freshDraft = draftsMap[selectedYearMonth];
      if (!freshDraft) return;

      if (freshDraft.finalResult) {
        // 다른 사람이 그 사이 먼저 확정함 — 이 클라이언트가 방금 뽑은 결과는 버리고 그 결과를 그대로 반영
        draft.finalResult = freshDraft.finalResult;
        var fr = freshDraft.finalResult;
        if (fr.criteria !== criteria || fr.teamName !== winnerRow.team.name || fr.pomName !== pomName) {
          renderFinalReveal(draft, fr.criteria, fr.teamName, fr.pomName, false);
        }
        return;
      }

      if (!freshDraft.results) freshDraft.results = {};
      if (!freshDraft.results[pomName]) freshDraft.results[pomName] = {};
      freshDraft.results[pomName].pom = true;
      freshDraft.finalResult = { criteria: criteria, teamName: winnerRow.team.name, pomName: pomName, decidedAt: Date.now() };

      var playerStats = fresh.playerStats || {};
      if (!playerStats[pomName]) playerStats[pomName] = { win: 0, loss: 0, draw: 0, pom: 0 };
      playerStats[pomName].pom = (playerStats[pomName].pom || 0) + 1;

      if (!fresh.drafts) fresh.drafts = {};
      fresh.drafts[selectedYearMonth] = freshDraft;
      fresh.playerStats = playerStats;

      var putRes = await fetch(FIREBASE_URL + STATE_PATH, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(fresh)
      });
      if (putRes.ok) {
        stateData = fresh;
        // 같은 세션에서 다시 열었을 때 재추첨 없이 바로 확정 결과가 보이도록 원본 draft도 동기화
        draft.finalResult = freshDraft.finalResult;
        if (!draft.results) draft.results = {};
        if (!draft.results[pomName]) draft.results[pomName] = {};
        draft.results[pomName].pom = true;
      }
    } catch (e) {
      // 저장 실패해도 화면에는 이미 결과가 표시되어 있음 — 다음 방문 시 재확정 시도됨
    }
  }

  loadState();
})();
</script>
