<title>팀 드래프트</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>

  :root {
    color-scheme: light;
    --bg: #ffffff;
    --bg-alt: #f5f5f7;
    --panel: #f5f5f7;
    --panel-2: #ffffff;
    --line: #d2d2d7;
    --ink: #1d1d1f;
    --ink-dim: #6e6e73;
    --ink-faint: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30;
    --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d;
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-bg-strong: rgba(255, 255, 255, 0.82);
    --glass-border: rgba(255, 255, 255, 0.7);
    --font-display: "Roboto", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Helvetica, Arial, sans-serif;
    --font-body: "Roboto", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #000000;
      --bg-alt: #1d1d1f;
      --panel: #1d1d1f;
      --panel-2: #161617;
      --line: #38383a;
      --ink: #f5f5f7;
      --ink-dim: #a1a1a6;
      --ink-faint: #6e6e73;
      --accent: #2997ff;
      --accent-hover: #52aeff;
      --accent-soft: rgba(41, 151, 255, 0.14);
      --danger: #ff453a;
      --danger-soft: rgba(255, 69, 58, 0.16);
      --good: #32d74b;
      --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
      --wash:
        radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
        radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
        radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
      --glass-bg: rgba(30, 30, 32, 0.55);
      --glass-bg-strong: rgba(22, 22, 23, 0.82);
      --glass-border: rgba(255, 255, 255, 0.09);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #000000;
    --bg-alt: #1d1d1f;
    --panel: #1d1d1f;
    --panel-2: #161617;
    --line: #38383a;
    --ink: #f5f5f7;
    --ink-dim: #a1a1a6;
    --ink-faint: #6e6e73;
    --accent: #2997ff;
    --accent-hover: #52aeff;
    --accent-soft: rgba(41, 151, 255, 0.14);
    --danger: #ff453a;
    --danger-soft: rgba(255, 69, 58, 0.16);
    --good: #32d74b;
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
    --glass-bg: rgba(30, 30, 32, 0.55);
    --glass-bg-strong: rgba(22, 22, 23, 0.82);
    --glass-border: rgba(255, 255, 255, 0.09);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #ffffff;
    --bg-alt: #f5f5f7;
    --panel: #f5f5f7;
    --panel-2: #ffffff;
    --line: #d2d2d7;
    --ink: #1d1d1f;
    --ink-dim: #6e6e73;
    --ink-faint: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30;
    --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d;
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-bg-strong: rgba(255, 255, 255, 0.82);
    --glass-border: rgba(255, 255, 255, 0.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background-color: var(--bg);
    background-image: var(--wash);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: var(--font-body); cursor: pointer; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 56px 24px 96px;
  }

  /* ---------- Hero ---------- */
  .hero {
    text-align: center;
    max-width: 640px;
    margin: 0 auto 56px;
  }
  .hero .eyebrow {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(2.1rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.15;
    margin: 0 0 14px;
    text-wrap: balance;
  }
  .hero p {
    font-size: 1.1rem;
    line-height: 1.55;
    color: var(--ink-dim);
    margin: 0;
    text-wrap: balance;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .status-row .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink-faint);
  }
  .status-row.on-air .dot { background: var(--accent); animation: pulse-dot 1.1s ease-in-out infinite; }
  .status-row.on-air { color: var(--accent); }
  .status-row.done .dot { background: var(--good); }
  .status-row.done { color: var(--good); }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.75); }
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ---------- Setup screen ---------- */
  .setup-grid {
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  @media (max-width: 720px) {
    .setup-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 30px;
    box-shadow: var(--shadow-soft);
  }
  .panel h2 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.005em;
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel h2 .count {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 9px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .panel .hint {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--ink-dim);
    margin: 0 0 20px;
  }

  .roster-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 36px;
    margin-bottom: 16px;
  }
  .roster-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 8px 7px 14px;
    font-size: 0.88rem;
    font-weight: 500;
    animation: chip-in 0.28s ease both;
  }
  @keyframes chip-in {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes chip-out {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.8); }
  }
  .roster-chip.chip-out {
    animation: chip-out 0.16s ease forwards;
    pointer-events: none;
  }
  .roster-chip button {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--ink-faint);
    font-size: 0.9rem;
    line-height: 1;
    display: grid;
    place-items: center;
    transition: background 0.15s, color 0.15s;
  }
  .roster-chip button:hover { background: var(--danger-soft); color: var(--danger); }
  .roster-empty {
    color: var(--ink-faint);
    font-size: 0.88rem;
    padding: 8px 0;
  }

  .add-row {
    display: flex;
    gap: 8px;
  }
  .add-row input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--ink);
    font-size: 0.94rem;
  }
  .add-row input::placeholder { color: var(--ink-faint); }

  .btn {
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--ink);
    border-radius: 10px;
    padding: 10px 18px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-alt); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .link-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-weight: 500;
    font-size: 0.95rem;
    padding: 6px 0;
  }
  .link-btn:hover { color: var(--accent-hover); text-decoration: underline; }

  .stepper {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 4px;
  }
  .stepper button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--ink);
    font-size: 1.2rem;
    font-weight: 500;
    display: grid;
    place-items: center;
    line-height: 1;
  }
  .stepper button:disabled { opacity: 0.3; cursor: not-allowed; }
  .stepper button:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
  .stepper .num {
    font-size: 2.2rem;
    font-weight: 700;
    min-width: 44px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  .rule-text {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--ink-dim);
    max-width: 560px;
    margin: 0 auto 28px;
    text-align: center;
  }

  .start-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .start-note {
    font-size: 0.85rem;
    color: var(--ink-faint);
  }
  .btn-start {
    font-size: 1rem;
    font-weight: 600;
    padding: 15px 34px;
    border-radius: 999px;
  }
  .mode-switch {
    display: inline-flex;
    padding: 4px;
    gap: 4px;
    border-radius: 999px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    color: var(--ink-dim);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 7px 15px;
    border-radius: 999px;
    transition: background 0.15s, color 0.15s;
    font-variant-numeric: tabular-nums;
  }
  .mode-btn:hover { color: var(--ink); }
  .mode-btn.active {
    background: var(--accent);
    color: #ffffff;
  }

  .host-panel {
    max-width: 360px;
    margin: 28px auto 0;
    text-align: center;
  }
  .host-panel label {
    display: block;
    font-size: 0.76rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .host-panel input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 9px 12px;
    color: var(--ink);
    font-size: 0.86rem;
    text-align: center;
  }
  .host-status {
    margin: 8px 0 0;
    font-size: 0.76rem;
    color: var(--ink-faint);
  }
  .btn-start:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: var(--panel);
    border-color: var(--line);
    color: var(--ink-faint);
  }

  /* ---------- Draft screen ---------- */
  .draft-head {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 24px;
  }
  .pick-counter {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .pick-counter b { color: var(--ink); font-size: 1.05rem; }

  .stage { margin-bottom: 32px; }

  .duel-stage {
    position: relative;
    min-height: 340px;
    border-radius: 26px;
    overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(60% 45% at 50% 102%, rgba(255, 110, 40, 0.28), transparent 70%),
      radial-gradient(120% 90% at 50% -10%, #241209 0%, #120a08 45%, #050404 100%);
    box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.07);
    opacity: 1;
    transition: opacity 0.32s ease;
  }
  .duel-stage.fade-out { opacity: 0; }
  .duel-stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(55% 40% at 50% 100%, rgba(255, 130, 50, 0.22), transparent 72%);
    animation: ember-pulse 3.2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes ember-pulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }
  .duel-stage::after {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 130px 40px rgba(0, 0, 0, 0.85);
    pointer-events: none;
  }

  .vs-flash {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 46%, rgba(255, 255, 255, 0.9), transparent 60%);
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }
  .vs-flash.show { animation: flash-pulse 0.55s ease-out; }
  @keyframes flash-pulse {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  .position-label {
    position: absolute;
    top: 20px;
    left: 50%;
    z-index: 4;
    transform: translate(-50%, -12px);
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #ffffff;
    padding: 9px 22px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.22);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(.2, .8, .2, 1.3);
  }
  .position-label.show { opacity: 1; transform: translate(-50%, 0); }

  .duel-arena {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 46px 16px 20px;
    gap: 6px;
  }

  .h2h-line {
    grid-column: 1 / -1;
    text-align: center;
    margin-top: 16px;
    font-size: clamp(1.05rem, 3vw, 1.35rem);
    font-weight: 800;
    letter-spacing: -0.005em;
    color: rgba(255, 255, 255, 0.85);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .h2h-line.show { opacity: 1; transform: translateY(0); }

  .h2h-commentary {
    grid-column: 1 / -1;
    text-align: center;
    margin-top: 6px;
    font-size: 0.86rem;
    font-weight: 500;
    font-style: italic;
    color: rgba(255, 255, 255, 0.5);
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .h2h-commentary.show { opacity: 1; }

  .contender {
    display: flex;
    opacity: 0;
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(.2, .75, .3, 1.05);
  }
  .contender.left { justify-content: flex-end; transform: translateX(-70px); }
  .contender.right { justify-content: flex-start; transform: translateX(70px); }
  .contender.show { opacity: 1; transform: translateX(0); }

  .contender-card {
    position: relative;
    width: min(244px, 44vw);
    padding: 22px 18px 20px;
    text-align: center;
    background: linear-gradient(160deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
    border: 1px solid var(--glow-color, #888);
    box-shadow:
      0 0 0 1px color-mix(in srgb, var(--glow-color, #888) 35%, transparent),
      inset 0 0 0 1px rgba(255, 255, 255, 0.08),
      0 0 44px -8px var(--glow-color, #888),
      0 20px 40px -22px rgba(0, 0, 0, 0.85);
    clip-path: polygon(50% 0%, 88% 8%, 100% 20%, 100% 88%, 84% 100%, 16% 100%, 0% 88%, 0% 20%, 12% 8%);
  }

  .contender-portrait {
    color: var(--glow-color, #fff);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }
  .contender-portrait svg {
    width: 74px;
    height: 74px;
    opacity: 0.92;
    filter: drop-shadow(0 0 18px var(--glow-color, #fff));
  }
  .contender-team-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid currentColor;
    margin-bottom: 12px;
  }
  .contender-name {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: #ffffff;
    word-break: keep-all;
    margin-bottom: 6px;
  }
  .card-divider {
    width: 60%;
    height: 1px;
    background: rgba(255, 255, 255, 0.18);
    margin: 0 auto 12px;
  }
  .card-stats {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 14px;
  }
  .stats-col {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .stats-divider {
    width: 1px;
    background: rgba(255, 255, 255, 0.18);
  }
  .stat {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .stat-val {
    font-size: 1rem;
    font-weight: 800;
    color: #ffffff;
    min-width: 24px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 0.64rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
  }

  .vs-mark {
    position: relative;
    z-index: 2;
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    font-weight: 900;
    font-style: italic;
    padding: 0 6px;
    background: linear-gradient(100deg, var(--left-color, #ff4655), var(--right-color, #3ea6ff));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.28));
    opacity: 0;
    transform: scale(0.4) rotate(-6deg);
    transition: opacity 0.3s ease, transform 0.5s cubic-bezier(.2, .8, .2, 1.4);
  }
  .vs-mark.show { opacity: 1; transform: scale(1) rotate(-6deg); }

  .rails {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .rail {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-top: 3px solid var(--rail-color, var(--line));
    border-radius: 16px;
    padding: 16px;
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .rail.on-clock-rail {
    box-shadow: 0 0 0 1px var(--rail-color), var(--shadow-soft);
    transform: translateY(-2px);
  }
  .rail .rail-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .rail .rail-name {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--rail-color, var(--ink));
  }
  .rail .rail-count {
    font-size: 0.74rem;
    font-weight: 600;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .rail-members {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .rail-slot {
    font-size: 0.84rem;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--panel-2);
    color: var(--ink);
    animation: chip-in 0.3s ease both;
  }

  /* ---------- Result screen ---------- */
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }
  .result-card {
    position: relative;
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 22px 20px 20px;
    overflow: hidden;
    box-shadow: var(--shadow-soft);
    animation: card-drop 0.5s cubic-bezier(.2,.8,.3,1.05) both;
  }
  @keyframes card-drop {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .result-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--card-color);
  }
  .result-card .r-name {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.005em;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .result-card .r-sub {
    font-size: 0.76rem;
    font-weight: 600;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .result-card .r-sub .swatch {
    color: var(--card-color);
  }
  .result-card ol {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .result-card li {
    display: flex;
    align-items: baseline;
    gap: 9px;
    font-size: 0.92rem;
    font-weight: 500;
  }
  .result-card li .n {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--ink-faint);
    min-width: 16px;
    font-variant-numeric: tabular-nums;
  }

  .result-actions {
    display: flex;
    justify-content: center;
  }

  .bgm-control {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 50;
  }
  .bgm-control[hidden] { display: none; }

  .bgm-toggle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    font-size: 1.1rem;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-soft);
  }

  .bgm-volume-wrap {
    position: absolute;
    top: 46px;
    right: 8px;
    height: 96px;
    width: 34px;
    padding: 12px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow: var(--shadow-soft);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .bgm-control:hover .bgm-volume-wrap,
  .bgm-control:focus-within .bgm-volume-wrap {
    opacity: 1;
    pointer-events: auto;
  }
  #bgmVolume {
    writing-mode: vertical-lr;
    direction: rtl;
    width: 4px;
    height: 82px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>

<div id="ytPlayer" style="position:absolute; width:2px; height:2px; overflow:hidden; opacity:0; pointer-events:none;"></div>
<div class="bgm-control" id="bgmControl" hidden>
  <button id="bgmToggle" class="bgm-toggle" aria-label="배경음악 켜기/끄기">🔊</button>
  <div class="bgm-volume-wrap">
    <input type="range" id="bgmVolume" min="0" max="100" value="70" aria-label="배경음악 볼륨" />
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <span class="eyebrow">E스포츠 동호회</span>
    <h1 id="heroTitle">이번엔 누구와 팀이 될까요?</h1>
    <p id="heroSub">카드를 열기 전까진 아무도 모릅니다. 무작위지만, 결과는 공정합니다.</p>
    <div class="status-row" id="statusRow"><span class="dot"></span><span id="statusLabel">준비 중</span></div>
  </div>

  <!-- ================= SETUP ================= -->
  <section class="screen active" id="screen-setup">
    <div class="setup-grid">
      <div class="panel">
        <h2>참가자 <span class="count" id="rosterCount">0</span></h2>
        <p class="hint">드래프트에 참여할 인원을 추가하거나 삭제하세요.</p>
        <div class="roster-list" id="rosterList"></div>
        <div class="add-row">
          <input id="nameInput" type="text" placeholder="이름 입력 후 Enter" maxlength="12" />
          <button class="btn" id="addBtn">추가하기</button>
        </div>
      </div>

      <div class="panel">
        <div class="mode-switch" role="radiogroup" aria-label="기록 모드">
          <button type="button" class="mode-btn active" id="modeOfficialBtn" data-mode="official" role="radio" aria-checked="true"></button>
          <button type="button" class="mode-btn" id="modeTestBtn" data-mode="test" role="radio" aria-checked="false">테스트</button>
        </div>
        <h2>팀 구성</h2>
        <p class="hint">최소 2팀, 최대 8팀까지 구성할 수 있습니다. 팀 이름은 드래프트가 시작되면 공개됩니다.</p>
        <div class="stepper">
          <button id="teamMinus" aria-label="팀 수 감소">–</button>
          <span class="num" id="teamCountNum">2</span>
          <button id="teamPlus" aria-label="팀 수 증가">+</button>
        </div>
      </div>
    </div>

    <p class="rule-text">시작하면 참가자가 무작위 순서로 등장하고, 등장과 동시에 팀에 배정됩니다. 팀은 순서대로 돌아가며 인원을 채웁니다.</p>

    <div class="start-row">
      <button class="btn btn-primary btn-start" id="startBtn">드래프트 시작하기</button>
      <span class="start-note" id="startNote"></span>
    </div>

    <div class="host-panel">
      <label for="hostTokenInput">공유 설정 (선택)</label>
      <input type="password" id="hostTokenInput" placeholder="GitHub 토큰 붙여넣기" autocomplete="off" />
      <p class="host-status" id="hostTokenStatus"></p>
    </div>
  </section>

  <!-- ================= DRAFT ================= -->
  <section class="screen" id="screen-draft">
    <div class="draft-head">
      <span class="pick-counter">PICK <b id="pickNow">0</b> / <span id="pickTotal">0</span></span>
    </div>

    <div class="stage" id="stage">
      <!-- duel arena injected here -->
    </div>

    <div class="rails" id="rails"></div>
  </section>

  <!-- ================= RESULT ================= -->
  <section class="screen" id="screen-result">
    <div class="result-grid" id="resultGrid"></div>
    <div class="result-actions">
      <button class="link-btn" id="restartBtn">새로 시작하기 ›</button>
    </div>
  </section>
</div>

<script>
(function () {
  "use strict";

  var TEAM_COLORS = ["#0a5cd8", "#ff8a3d", "#3fae74", "#9b6bd6", "#2fb8c6", "#ef5f8a", "#caa23a", "#2bb3a3"];
  var TEAM_COLOR_NAMES = ["딥 블루", "코스믹 오렌지", "세이지 그린", "라벤더", "스카이 블루", "코럴 핑크", "골드", "민트"];
  var TEAM_NAME_POOL = ["T1", "Gen.G", "Dplus KIA", "KT Rolster", "Hanwha Life Esports", "DRX", "Kwangdong Freecs", "Nongshim RedForce", "BRION", "FearX"];
  var DEFAULT_ROSTER = ["고재형", "지한규", "이예은", "편한슬", "이도현", "조이진", "유다현", "임준", "김탁우", "원종훈", "임별"];
  var POSITION_NAMES = ["선봉전", "차봉전", "중견전", "부장전", "대장전"];

  // 관리자 점수 등록 페이지(admin.html)가 gacha-state.json에 누적시킨 실제 전적으로 채워짐.
  // 불러오기 전/실패 시에는 빈 객체 -> getStats()가 전원 0으로 폴백.
  var PLAYER_STATS = {};
  var HEAD_TO_HEAD = {};

  var state = {
    roster: DEFAULT_ROSTER.slice(),
    teamCount: 2,
    teams: [],
    order: [],
    pickIndex: 0,
    isTest: false
  };

  function currentYearMonthLabel() {
    var d = new Date();
    return d.getFullYear() + "년 " + (d.getMonth() + 1) + "월";
  }

  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function $(id) { return document.getElementById(id); }

  // ---------- Shared state (gacha-state.json in this repo, via GitHub Contents API) ----------
  var REPO_OWNER = "whikebaintres";
  var REPO_NAME = "team-draft";
  var STATE_PATH = "gacha-state.json";
  var hostToken = localStorage.getItem("gachaHostToken") || "";

  function b64EncodeUnicode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64DecodeUnicode(str) {
    return decodeURIComponent(escape(atob(str.replace(/\n/g, ""))));
  }

  function loadPlayerStats() {
    fetch(STATE_PATH + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (res) { return res.ok ? res.json() : null; })
      .then(function (data) {
        if (data && data.playerStats) PLAYER_STATS = data.playerStats;
        if (data && data.headToHead) HEAD_TO_HEAD = data.headToHead;
      })
      .catch(function () {});
  }

  function updateHostStatus(text) {
    var el = $("hostTokenStatus");
    if (el) el.textContent = text;
  }

  async function publishLatestDraft() {
    if (!hostToken) return;
    updateHostStatus("공유하는 중…");
    try {
      var apiUrl = "https://api.github.com/repos/" + REPO_OWNER + "/" + REPO_NAME + "/contents/" + STATE_PATH;
      var getRes = await fetch(apiUrl, {
        headers: { Authorization: "Bearer " + hostToken, Accept: "application/vnd.github+json" }
      });
      var sha = null;
      var current = { playerStats: {}, latestDraft: null };
      if (getRes.status === 200) {
        var meta = await getRes.json();
        sha = meta.sha;
        try { current = JSON.parse(b64DecodeUnicode(meta.content)); } catch (e) {}
      }
      var pairs = [];
      for (var i = 0; i + 1 < state.order.length; i += 2) {
        pairs.push([state.order[i], state.order[i + 1]]);
      }
      current.latestDraft = {
        runId: "d" + Date.now() + "-" + Math.random().toString(36).slice(2, 7),
        createdAt: Date.now(),
        yearMonth: currentYearMonthLabel(),
        scored: false,
        teams: state.teams.map(function (t) {
          return { name: t.name, color: t.color, colorName: t.colorName, members: t.members.slice() };
        }),
        pairs: pairs,
        results: null
      };
      var body = { message: "gacha draft: publish latest draft", content: b64EncodeUnicode(JSON.stringify(current)) };
      if (sha) body.sha = sha;
      var putRes = await fetch(apiUrl, {
        method: "PUT",
        headers: {
          Authorization: "Bearer " + hostToken,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });
      if (putRes.ok) {
        updateHostStatus("공유 완료! 관리자 페이지(admin.html)에서 채점할 수 있어요.");
      } else {
        updateHostStatus("공유 실패 (토큰 권한을 확인해주세요).");
      }
    } catch (e) {
      updateHostStatus("공유 실패 (네트워크 오류).");
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- SFX (카드 확정 / 상대전적 공개 효과음) ----------
  var cardConfirmSfx = new Audio("FFXIV_Confirm.mp3");
  cardConfirmSfx.preload = "auto";
  cardConfirmSfx.volume = 0.5;

  function playCardConfirmSfx() {
    try {
      cardConfirmSfx.currentTime = 0;
      cardConfirmSfx.play().catch(function () {});
    } catch (e) {}
  }

  var h2hRevealSfx = new Audio("charge.mp3");
  h2hRevealSfx.preload = "auto";
  h2hRevealSfx.volume = 0.5;

  function playH2hRevealSfx() {
    try {
      h2hRevealSfx.currentTime = 0;
      h2hRevealSfx.play().catch(function () {});
    } catch (e) {}
  }

  // ---------- BGM (YouTube IFrame API) ----------
  var BGM_VIDEO_ID = "Q_ScMi6sEsQ";
  var ytPlayerObj = null;
  var ytReady = false;
  var bgmWantsPlay = false;
  var bgmMuted = localStorage.getItem("gachaBgmMuted") === "1";
  var bgmVolume = parseInt(localStorage.getItem("gachaBgmVolume") || "70", 10);

  window.onYouTubeIframeAPIReady = function () {
    ytPlayerObj = new YT.Player("ytPlayer", {
      videoId: BGM_VIDEO_ID,
      playerVars: {
        autoplay: 0,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        rel: 0,
        loop: 1,
        playlist: BGM_VIDEO_ID
      },
      events: {
        onReady: function (e) {
          ytReady = true;
          e.target.setVolume(bgmVolume);
          if (bgmMuted) e.target.mute();
          if (bgmWantsPlay) e.target.playVideo();
        }
      }
    });
  };

  (function loadYouTubeApi() {
    var tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  })();

  function playBgm() {
    bgmWantsPlay = true;
    $("bgmControl").hidden = false;
    if (ytReady && ytPlayerObj) ytPlayerObj.playVideo();
  }

  function stopBgm() {
    bgmWantsPlay = false;
    if (ytReady && ytPlayerObj) {
      ytPlayerObj.pauseVideo();
      ytPlayerObj.seekTo(0, true);
    }
  }

  function updateBgmToggleIcon() {
    $("bgmToggle").textContent = bgmMuted ? "🔇" : "🔊";
  }
  updateBgmToggleIcon();
  $("bgmVolume").value = bgmVolume;

  $("bgmToggle").addEventListener("click", function () {
    bgmMuted = !bgmMuted;
    localStorage.setItem("gachaBgmMuted", bgmMuted ? "1" : "0");
    updateBgmToggleIcon();
    if (ytReady && ytPlayerObj) {
      if (bgmMuted) ytPlayerObj.mute(); else ytPlayerObj.unMute();
    }
  });

  $("bgmVolume").addEventListener("input", function () {
    bgmVolume = parseInt(this.value, 10);
    localStorage.setItem("gachaBgmVolume", String(bgmVolume));
    if (ytReady && ytPlayerObj) ytPlayerObj.setVolume(bgmVolume);
  });

  function showScreen(name) {
    document.querySelectorAll(".screen").forEach(function (s) { s.classList.remove("active"); });
    $("screen-" + name).classList.add("active");

    var row = $("statusRow");
    row.classList.remove("on-air", "done");
    if (name === "setup") {
      $("statusLabel").textContent = "준비 중";
      $("heroTitle").textContent = "이번엔 누구와 팀이 될까요?";
      $("heroSub").textContent = "카드를 열기 전까진 아무도 모릅니다. 무작위지만, 결과는 공정합니다.";
    } else if (name === "draft") {
      row.classList.add("on-air");
      $("statusLabel").textContent = "드래프트 진행 중";
      $("heroTitle").textContent = "대결이 시작됩니다.";
      $("heroSub").textContent = "누가 나올지는, 등장하는 순간 알 수 있습니다.";
    } else {
      row.classList.add("done");
      $("statusLabel").textContent = "완료";
      $("heroTitle").textContent = "완성된 라인업.";
      $("heroSub").textContent = state.isTest
        ? "테스트 모드로 진행되어 전적에 기록되지 않았습니다."
        : "무작위였지만, 공정했습니다. 좋은 경기 되세요.";
    }
  }

  /* ---------------- Setup screen ---------------- */

  function createChipEl(name) {
    var chip = document.createElement("span");
    chip.className = "roster-chip";
    chip.dataset.name = name;
    var label = document.createElement("span");
    label.textContent = name;
    var del = document.createElement("button");
    del.textContent = "×";
    del.setAttribute("aria-label", name + " 삭제");
    del.addEventListener("click", function () {
      var idx = state.roster.indexOf(name);
      if (idx !== -1) state.roster.splice(idx, 1);
      syncRosterList();
      validateStart();
    });
    chip.appendChild(label);
    chip.appendChild(del);
    return chip;
  }

  function removeChipEl(chip) {
    chip.classList.add("chip-out");
    chip.addEventListener("animationend", function handler() {
      chip.removeEventListener("animationend", handler);
      chip.remove();
    });
  }

  function syncRosterList() {
    var list = $("rosterList");
    var existing = {};
    Array.prototype.forEach.call(list.querySelectorAll(".roster-chip"), function (chip) {
      existing[chip.dataset.name] = chip;
    });

    Object.keys(existing).forEach(function (name) {
      if (state.roster.indexOf(name) === -1) {
        removeChipEl(existing[name]);
      }
    });

    state.roster.forEach(function (name) {
      if (!existing[name]) {
        list.appendChild(createChipEl(name));
      }
    });

    var emptyEl = list.querySelector(".roster-empty");
    if (state.roster.length === 0) {
      if (!emptyEl) {
        var empty = document.createElement("div");
        empty.className = "roster-empty";
        empty.textContent = "참가자를 추가해주세요.";
        list.appendChild(empty);
      }
    } else if (emptyEl) {
      emptyEl.remove();
    }

    $("rosterCount").textContent = state.roster.length;
    clampTeamCount();
  }

  function addParticipant() {
    var input = $("nameInput");
    var name = input.value.trim();
    if (!name) return;
    if (state.roster.indexOf(name) !== -1) {
      input.value = "";
      input.placeholder = "이미 있는 이름이에요";
      return;
    }
    state.roster.push(name);
    input.value = "";
    syncRosterList();
    validateStart();
  }

  function clampTeamCount() {
    var maxAllowed = Math.min(8, Math.max(2, state.roster.length || 2));
    if (state.teamCount > maxAllowed) state.teamCount = maxAllowed;
    if (state.teamCount < 2) state.teamCount = 2;
    $("teamCountNum").textContent = state.teamCount;
    $("teamMinus").disabled = state.teamCount <= 2;
    $("teamPlus").disabled = state.teamCount >= 8 || state.teamCount >= state.roster.length;
  }

  function validateStart() {
    var btn = $("startBtn");
    var note = $("startNote");
    if (state.roster.length < state.teamCount) {
      btn.disabled = true;
      note.textContent = "참가자가 팀 수보다 적어요. (참가자 " + state.roster.length + "명 / 팀 " + state.teamCount + "개)";
    } else if (state.roster.length === 0) {
      btn.disabled = true;
      note.textContent = "참가자를 먼저 추가해주세요.";
    } else {
      btn.disabled = false;
      note.textContent = "참가자 " + state.roster.length + "명 · " + state.teamCount + "팀으로 준비 완료";
    }
  }

  $("addBtn").addEventListener("click", addParticipant);
  $("nameInput").addEventListener("keydown", function (e) {
    if (e.key === "Enter") addParticipant();
  });
  $("teamMinus").addEventListener("click", function () {
    state.teamCount = Math.max(2, state.teamCount - 1);
    clampTeamCount(); validateStart();
  });
  $("teamPlus").addEventListener("click", function () {
    state.teamCount = Math.min(8, state.teamCount + 1);
    clampTeamCount(); validateStart();
  });

  $("modeOfficialBtn").textContent = currentYearMonthLabel();

  function setRecordMode(mode) {
    state.isTest = (mode === "test");
    $("modeOfficialBtn").classList.toggle("active", !state.isTest);
    $("modeOfficialBtn").setAttribute("aria-checked", String(!state.isTest));
    $("modeTestBtn").classList.toggle("active", state.isTest);
    $("modeTestBtn").setAttribute("aria-checked", String(state.isTest));
  }
  $("modeOfficialBtn").addEventListener("click", function () { setRecordMode("official"); });
  $("modeTestBtn").addEventListener("click", function () { setRecordMode("test"); });
  setRecordMode("official");

  /* ---------------- Draft screen ---------------- */

  function buildTeams() {
    var order = shuffle(TEAM_COLORS.map(function (_, i) { return i; })).slice(0, state.teamCount);
    var names = shuffle(TEAM_NAME_POOL).slice(0, state.teamCount);
    state.teams = names.map(function (name, i) {
      var colorIdx = order[i];
      return { name: name, color: TEAM_COLORS[colorIdx], colorName: TEAM_COLOR_NAMES[colorIdx], members: [] };
    });
  }

  function renderRails(activeTeamIdx) {
    var rails = $("rails");
    rails.innerHTML = "";
    state.teams.forEach(function (team, i) {
      var rail = document.createElement("div");
      rail.className = "rail" + (i === activeTeamIdx ? " on-clock-rail" : "");
      rail.style.setProperty("--rail-color", team.color);

      var head = document.createElement("div");
      head.className = "rail-head";
      var rname = document.createElement("span");
      rname.className = "rail-name";
      rname.textContent = team.name;
      var rcount = document.createElement("span");
      rcount.className = "rail-count";
      rcount.textContent = team.members.length + " PICKS";
      head.appendChild(rname);
      head.appendChild(rcount);
      rail.appendChild(head);

      var membersWrap = document.createElement("div");
      membersWrap.className = "rail-members";
      team.members.forEach(function (m) {
        var slot = document.createElement("div");
        slot.className = "rail-slot";
        slot.textContent = m;
        membersWrap.appendChild(slot);
      });
      rail.appendChild(membersWrap);

      rails.appendChild(rail);
    });
  }

  function positionLabel(pairIndex, totalPairs) {
    var list;
    if (totalPairs === 4) {
      list = ["선봉전", "차봉전", "부장전", "대장전"];
    } else if (totalPairs >= 5 || totalPairs <= 0) {
      list = POSITION_NAMES;
    } else {
      list = POSITION_NAMES.slice(0, totalPairs - 1).concat("대장전");
    }
    return pairIndex < list.length ? list[pairIndex] : (pairIndex + 1) + "번째 대결";
  }

  var SILHOUETTE_SVG = '<svg viewBox="0 0 100 100" fill="currentColor" aria-hidden="true">' +
    '<circle cx="50" cy="34" r="20"/>' +
    '<path d="M50 58c-24 0-38 16-38 34v8h76v-8c0-18-14-34-38-34z"/>' +
    '</svg>';

  function buildStatEl(labelText) {
    var stat = document.createElement("div");
    stat.className = "stat";
    var val = document.createElement("span");
    val.className = "stat-val";
    var label = document.createElement("span");
    label.className = "stat-label";
    label.textContent = labelText;
    stat.appendChild(val);
    stat.appendChild(label);
    return { el: stat, val: val };
  }

  function buildContenderEl(side) {
    var el = document.createElement("div");
    el.className = "contender " + side;
    var card = document.createElement("div");
    card.className = "contender-card";

    var portrait = document.createElement("div");
    portrait.className = "contender-portrait";
    portrait.innerHTML = SILHOUETTE_SVG;

    var name = document.createElement("div");
    name.className = "contender-name";
    var tag = document.createElement("div");
    tag.className = "contender-team-tag";
    var divider = document.createElement("div");
    divider.className = "card-divider";

    var stats = document.createElement("div");
    stats.className = "card-stats";
    var colLeft = document.createElement("div");
    colLeft.className = "stats-col";
    var statWin = buildStatEl("승");
    var statLoss = buildStatEl("패");
    colLeft.appendChild(statWin.el);
    colLeft.appendChild(statLoss.el);

    var statsDivider = document.createElement("div");
    statsDivider.className = "stats-divider";

    var colRight = document.createElement("div");
    colRight.className = "stats-col";
    var statRate = buildStatEl("승률");
    var statMvp = buildStatEl("POM");
    colRight.appendChild(statRate.el);
    colRight.appendChild(statMvp.el);

    stats.appendChild(colLeft);
    stats.appendChild(statsDivider);
    stats.appendChild(colRight);

    card.appendChild(portrait);
    card.appendChild(name);
    card.appendChild(tag);
    card.appendChild(divider);
    card.appendChild(stats);
    el.appendChild(card);

    el._refs = {
      card: card, name: name, tag: tag,
      win: statWin.val, loss: statLoss.val, rate: statRate.val, mvp: statMvp.val
    };
    return el;
  }

  function getStats(personName) {
    var s = PLAYER_STATS[personName];
    if (!s) return { win: 0, loss: 0, draw: 0, pom: 0, rate: 0 };
    var total = s.win + s.loss + s.draw;
    var rate = total > 0 ? Math.round((s.win / total) * 100) : 0;
    return { win: s.win, loss: s.loss, draw: s.draw, pom: s.pom, rate: rate };
  }

  function getHeadToHead(nameX, nameY) {
    var rec = HEAD_TO_HEAD[nameX + "|" + nameY] || HEAD_TO_HEAD[nameY + "|" + nameX];
    if (!rec) return { win: 0, loss: 0, draw: 0, total: 0 };
    var win, loss;
    if (rec.a === nameX) { win = rec.aWin; loss = rec.bWin; }
    else { win = rec.bWin; loss = rec.aWin; }
    return { win: win, loss: loss, draw: rec.draw, total: win + loss + rec.draw };
  }

  function headToHeadLabel(leftName, rightName) {
    var h2h = getHeadToHead(leftName, rightName);
    if (h2h.total === 0) return "첫 맞대결";
    if (h2h.win === h2h.loss) {
      return "상대전적 " + h2h.win + "승 " + h2h.loss + "패 동률" + (h2h.draw ? " (" + h2h.draw + "무)" : "");
    }
    var leaderName = h2h.win > h2h.loss ? leftName : rightName;
    var leaderWins = Math.max(h2h.win, h2h.loss);
    var otherWins = Math.min(h2h.win, h2h.loss);
    return leaderName + " " + leaderWins + "승 " + otherWins + "패로 우위" + (h2h.draw ? " (" + h2h.draw + "무)" : "");
  }

  var FIRST_MEETING_LINES = [
    "설레는 첫 맞대결이네요.",
    "좋은 승부가 기대됩니다.",
    "첫 대결의 주인공은 과연 누가 될까요?",
    "기록에 없는 만큼, 무엇이든 가능합니다."
  ];
  var CLOSE_MATCH_LINES = [
    "이번에 앞서 나가는 것은 누구일까요?",
    "한 끗 차이, 승부는 아직 모릅니다.",
    "누가 먼저 균형을 깰지 지켜보시죠.",
    "막상막하의 대결, 긴장감이 넘칩니다."
  ];
  var DOMINANT_LINES = [
    "{trailing}님이 파죽지세를 달리고 있는 {leader}님을 저지할 수 있을까요?",
    "{leader}님의 압도적인 상대전적, {trailing}님은 반격할 수 있을까요?",
    "이대로 {leader}님의 독주가 계속될까요?",
    "{trailing}님에게는 자존심을 되찾을 기회입니다."
  ];

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function headToHeadCommentary(leftName, rightName) {
    var h2h = getHeadToHead(leftName, rightName);
    if (h2h.total === 0) return pickRandom(FIRST_MEETING_LINES);
    var diff = Math.abs(h2h.win - h2h.loss);
    if (diff <= 1) return pickRandom(CLOSE_MATCH_LINES);
    var leaderName = h2h.win > h2h.loss ? leftName : rightName;
    var trailingName = h2h.win > h2h.loss ? rightName : leftName;
    return pickRandom(DOMINANT_LINES)
      .replace(/\{leader\}/g, leaderName)
      .replace(/\{trailing\}/g, trailingName);
  }

  function fillContender(el, personName, team) {
    var refs = el._refs;
    refs.card.style.setProperty("--glow-color", team.color);
    refs.tag.textContent = team.name;
    refs.tag.style.color = team.color;
    refs.name.textContent = personName;
    var s = getStats(personName);
    refs.win.textContent = s.win;
    refs.loss.textContent = s.loss;
    refs.rate.textContent = s.rate + "%";
    refs.mvp.textContent = s.pom;
  }

  function showNextDuel() {
    if (state.pickIndex >= state.order.length) {
      finishDraft();
      return;
    }

    var pairIndex = Math.floor(state.pickIndex / 2);
    var leftIdx = state.pickIndex;
    var rightIdx = state.pickIndex + 1;
    var hasRight = rightIdx < state.order.length;

    var stageEl = $("stage");
    stageEl.innerHTML = "";

    var duelStage = document.createElement("div");
    duelStage.className = "duel-stage";
    var flash = document.createElement("div");
    flash.className = "vs-flash";
    var label = document.createElement("div");
    label.className = "position-label";
    var arena = document.createElement("div");
    arena.className = "duel-arena";
    var leftEl = buildContenderEl("left");
    var vsEl = document.createElement("div");
    vsEl.className = "vs-mark";
    vsEl.textContent = "VS";
    var rightEl = buildContenderEl("right");
    var h2hEl = document.createElement("div");
    h2hEl.className = "h2h-line";
    var h2hCommentaryEl = document.createElement("div");
    h2hCommentaryEl.className = "h2h-commentary";

    arena.appendChild(leftEl);
    arena.appendChild(vsEl);
    arena.appendChild(rightEl);
    arena.appendChild(h2hEl);
    arena.appendChild(h2hCommentaryEl);
    duelStage.appendChild(flash);
    duelStage.appendChild(label);
    duelStage.appendChild(arena);
    stageEl.appendChild(duelStage);

    if (!hasRight) {
      rightEl.style.visibility = "hidden";
      vsEl.style.visibility = "hidden";
      h2hEl.style.visibility = "hidden";
      h2hCommentaryEl.style.visibility = "hidden";
    }

    var leftName = state.order[leftIdx];
    var leftTeam = state.teams[leftIdx % state.teamCount];
    fillContender(leftEl, leftName, leftTeam);

    var rightName, rightTeam;
    if (hasRight) {
      rightName = state.order[rightIdx];
      rightTeam = state.teams[rightIdx % state.teamCount];
      fillContender(rightEl, rightName, rightTeam);
    }

    $("pickNow").textContent = hasRight ? rightIdx + 1 : leftIdx + 1;

    var k = reduceMotion ? 0.08 : 1;
    var HOLD_SOLO = 3000 * k;   // 첫 카드만 보여주는 시간
    var REVEAL_GAP = 900 * k;   // 상대 카드 등장 후 VS/상대전적 공개까지 텀
    var HOLD_REVEAL = 5000 * k; // 상대전적까지 공개된 뒤 대기 시간
    var EXIT_GAP = reduceMotion ? 80 : 340;

    setTimeout(function () {
      leftEl.classList.add("show");
      leftTeam.members.push(leftName);
      renderRails(leftIdx % state.teamCount);
      playCardConfirmSfx();
    }, 60);

    var rightAppearAt = 60 + HOLD_SOLO;
    var revealAt = rightAppearAt + REVEAL_GAP;

    if (hasRight) {
      setTimeout(function () {
        rightEl.classList.add("show");
        rightTeam.members.push(rightName);
        renderRails(rightIdx % state.teamCount);
        playCardConfirmSfx();
      }, rightAppearAt);

      setTimeout(function () {
        vsEl.style.setProperty("--left-color", leftTeam.color);
        vsEl.style.setProperty("--right-color", rightTeam.color);
        vsEl.classList.add("show");
        flash.classList.add("show");
        label.textContent = positionLabel(pairIndex, state.totalPairs);
        label.classList.add("show");
        h2hEl.textContent = headToHeadLabel(leftName, rightName);
        h2hEl.classList.add("show");
        h2hCommentaryEl.textContent = headToHeadCommentary(leftName, rightName);
        h2hCommentaryEl.classList.add("show");
        playH2hRevealSfx();
      }, revealAt);
    }

    var holdTotal = hasRight ? (revealAt + HOLD_REVEAL) : (60 + (reduceMotion ? 300 : 1800));

    setTimeout(function () {
      duelStage.classList.add("fade-out");
    }, holdTotal);

    setTimeout(function () {
      state.pickIndex += hasRight ? 2 : 1;
      showNextDuel();
    }, holdTotal + EXIT_GAP);
  }

  function startDraft() {
    buildTeams();
    state.order = shuffle(state.roster);
    state.pickIndex = 0;
    state.totalPairs = Math.ceil(state.order.length / 2);
    $("pickTotal").textContent = state.order.length;
    renderRails(-1);
    showScreen("draft");
    playBgm();
    showNextDuel();
  }

  function finishDraft() {
    var grid = $("resultGrid");
    grid.innerHTML = "";
    state.teams.forEach(function (team, i) {
      var card = document.createElement("div");
      card.className = "result-card";
      card.style.setProperty("--card-color", team.color);
      card.style.animationDelay = (i * 0.08) + "s";
      var ol = document.createElement("ol");
      team.members.forEach(function (m, mi) {
        var li = document.createElement("li");
        li.innerHTML = '<span class="n">' + (mi + 1).toString().padStart(2, "0") + '</span><span>' + escapeHtml(m) + '</span>';
        ol.appendChild(li);
      });
      card.innerHTML =
        '<div class="r-name">' + escapeHtml(team.name) + '</div>' +
        '<div class="r-sub">' + team.members.length + ' MEMBERS · <span class="swatch">' + escapeHtml(team.colorName) + '</span></div>';
      card.appendChild(ol);
      grid.appendChild(card);
    });
    showScreen("result");
    if (state.isTest) {
      updateHostStatus("테스트 모드라 기록되지 않았어요.");
    } else {
      publishLatestDraft();
    }
  }

  $("startBtn").addEventListener("click", startDraft);
  $("restartBtn").addEventListener("click", function () {
    showScreen("setup");
    validateStart();
    stopBgm();
    $("bgmControl").hidden = true;
    setRecordMode("official");
  });

  var hostTokenInput = $("hostTokenInput");
  hostTokenInput.value = hostToken;
  updateHostStatus(hostToken ? "토큰이 저장되어 있어요. 드래프트가 끝나면 자동으로 공유돼요." : "토큰이 없으면 이 브라우저에서만 진행돼요 (공유 안 됨).");
  hostTokenInput.addEventListener("change", function () {
    hostToken = hostTokenInput.value.trim();
    if (hostToken) {
      localStorage.setItem("gachaHostToken", hostToken);
      updateHostStatus("토큰이 저장되었어요. 드래프트가 끝나면 자동으로 공유돼요.");
    } else {
      localStorage.removeItem("gachaHostToken");
      updateHostStatus("토큰이 없으면 이 브라우저에서만 진행돼요 (공유 안 됨).");
    }
  });

  syncRosterList();
  validateStart();
  loadPlayerStats();
})();
</script>
