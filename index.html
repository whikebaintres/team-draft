<title>Team Draft — e스포츠 동호회 팀 편성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root {
    color-scheme: light;
    --sky-1: #fdf3f2;
    --sky-2: #eef3ff;
    --sky-3: #f6eefb;
    --panel: rgba(255, 255, 255, 0.72);
    --panel-edge: rgba(255, 255, 255, 0.9);
    --ink: #48405f;
    --muted: #948da8;
    --muted-2: #b3aec4;
    --line: rgba(90, 76, 120, 0.14);
    --line-strong: rgba(90, 76, 120, 0.24);
    --accent: #ff96ac;
    --accent-2: #7fd8c4;
    --accent-ink: #5b2436;
    --warn: #e4667f;
    --shadow-tint: rgba(150, 120, 170, 0.22);
    --team-1: #ff9fb5;
    --team-2: #7fd0b8;
    --team-3: #8fb8ef;
    --team-4: #cfa6ef;
    --team-5: #ffc98a;
    --team-6: #b7dd7c;
    --font-display: "Pretendard Variable", "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    --font-body: "Pretendard Variable", "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    --font-mono: "Pretendard Variable", "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --sky-1: #241f3d;
      --sky-2: #2b2350;
      --sky-3: #33254f;
      --panel: rgba(45, 38, 68, 0.6);
      --panel-edge: rgba(255, 255, 255, 0.1);
      --ink: #f3eefc;
      --muted: #b3a9d0;
      --muted-2: #877ea3;
      --line: rgba(255, 255, 255, 0.1);
      --line-strong: rgba(255, 255, 255, 0.18);
      --accent: #ff9fb5;
      --accent-2: #7fe0c9;
      --accent-ink: #2a1420;
      --warn: #ff8095;
      --shadow-tint: rgba(10, 6, 24, 0.5);
      --team-1: #ff9fb5;
      --team-2: #6bd9bd;
      --team-3: #93b9f2;
      --team-4: #d3aaf5;
      --team-5: #ffcf9c;
      --team-6: #c3e88a;
    }
  }

  :root[data-theme="dark"] {
    color-scheme: dark;
    --sky-1: #241f3d;
    --sky-2: #2b2350;
    --sky-3: #33254f;
    --panel: rgba(45, 38, 68, 0.6);
    --panel-edge: rgba(255, 255, 255, 0.1);
    --ink: #f3eefc;
    --muted: #b3a9d0;
    --muted-2: #877ea3;
    --line: rgba(255, 255, 255, 0.1);
    --line-strong: rgba(255, 255, 255, 0.18);
    --accent: #ff9fb5;
    --accent-2: #7fe0c9;
    --accent-ink: #2a1420;
    --warn: #ff8095;
    --shadow-tint: rgba(10, 6, 24, 0.5);
    --team-1: #ff9fb5;
    --team-2: #6bd9bd;
    --team-3: #93b9f2;
    --team-4: #d3aaf5;
    --team-5: #ffcf9c;
    --team-6: #c3e88a;
  }

  :root[data-theme="light"] {
    color-scheme: light;
    --sky-1: #fdf3f2;
    --sky-2: #eef3ff;
    --sky-3: #f6eefb;
    --panel: rgba(255, 255, 255, 0.72);
    --panel-edge: rgba(255, 255, 255, 0.9);
    --ink: #48405f;
    --muted: #948da8;
    --muted-2: #b3aec4;
    --line: rgba(90, 76, 120, 0.14);
    --line-strong: rgba(90, 76, 120, 0.24);
    --accent: #ff96ac;
    --accent-2: #7fd8c4;
    --accent-ink: #5b2436;
    --warn: #e4667f;
    --shadow-tint: rgba(150, 120, 170, 0.22);
    --team-1: #ff9fb5;
    --team-2: #7fd0b8;
    --team-3: #8fb8ef;
    --team-4: #cfa6ef;
    --team-5: #ffc98a;
    --team-6: #b7dd7c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background: linear-gradient(165deg, var(--sky-1), var(--sky-2) 55%, var(--sky-3));
    color: var(--ink);
    font-family: var(--font-body);
    display: flex;
    justify-content: center;
    padding: 32px 16px 60px;
    position: relative;
  }

  .cloud {
    position: fixed;
    border-radius: 50%;
    filter: blur(38px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
  }
  .cloud-a { width: 340px; height: 220px; top: -60px; left: -80px; background: radial-gradient(circle, var(--accent), transparent 70%); }
  .cloud-b { width: 300px; height: 220px; top: 40%; right: -100px; background: radial-gradient(circle, var(--accent-2), transparent 70%); }
  .cloud-c { width: 260px; height: 200px; bottom: -80px; left: 20%; background: radial-gradient(circle, var(--team-4), transparent 70%); }

  @media (prefers-reduced-motion: no-preference) {
    .cloud-a { animation: driftA 32s ease-in-out infinite alternate; }
    .cloud-b { animation: driftB 38s ease-in-out infinite alternate; }
    .cloud-c { animation: driftC 26s ease-in-out infinite alternate; }
  }
  @keyframes driftA { to { transform: translate(40px, 30px); } }
  @keyframes driftB { to { transform: translate(-30px, -40px); } }
  @keyframes driftC { to { transform: translate(30px, -20px); } }

  .sky-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1040px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--panel-edge);
    border-radius: 32px;
    padding: 26px;
    box-shadow: 0 40px 80px -30px var(--shadow-tint);
  }

  .banner { text-align: center; padding: 12px 10px 20px; }

  .banner h1 {
    margin: 0 0 2px;
    font-family: var(--font-display);
    font-weight: 800;
    letter-spacing: -0.01em;
    font-size: clamp(38px, 7.5vw, 58px);
    color: var(--accent);
    text-wrap: balance;
  }

  .banner .subtitle {
    margin: 4px 0 14px;
    font-size: 12.5px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .ribbon-wave { width: 60%; max-width: 320px; height: 14px; margin: 0 auto; display: block; }

  .stage {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 18px;
    align-items: start;
    margin-top: 10px;
  }

  @media (max-width: 720px) {
    .stage { grid-template-columns: 1fr; }
  }

  .control-panel {
    background: rgba(255, 255, 255, 0.35);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  :root[data-theme="dark"] .control-panel, @media (prefers-color-scheme: dark) { }

  .panel-block h2 {
    margin: 0 0 10px;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }

  .panel-block-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .panel-block-head h2 { margin: 0; }

  .count-badge {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: var(--accent-ink);
    background: color-mix(in srgb, var(--accent) 30%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 50%, transparent);
    padding: 2px 10px;
    border-radius: 999px;
  }

  .add-row { display: flex; gap: 6px; margin-bottom: 10px; }

  #nameInput, #hostTokenInput {
    flex: 1;
    min-width: 0;
    width: 100%;
    box-sizing: border-box;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink);
    padding: 8px 14px;
    font-size: 14px;
    font-family: var(--font-body);
  }
  :root[data-theme="dark"] #nameInput, :root[data-theme="dark"] #hostTokenInput { background: rgba(255, 255, 255, 0.08); }
  @media (prefers-color-scheme: dark) { #nameInput, #hostTokenInput { background: rgba(255, 255, 255, 0.08); } }
  #nameInput:focus-visible, #hostTokenInput:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  #hostTokenInput { margin-bottom: 6px; }

  .btn-add {
    border: 1px solid var(--line-strong);
    background: rgba(255, 255, 255, 0.55);
    color: var(--ink);
    border-radius: 999px;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent-ink); }

  .chip-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 6px 4px 14px;
    font-size: 13px;
  }
  @media (prefers-color-scheme: dark) { .chip, .btn-add { background: rgba(255, 255, 255, 0.08); } }
  :root[data-theme="dark"] .chip, :root[data-theme="dark"] .btn-add { background: rgba(255, 255, 255, 0.08); }

  .chip button {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: none;
    background: rgba(120, 100, 140, 0.15);
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
    font-size: 13px;
    display: grid;
    place-items: center;
  }
  .chip button:hover { background: var(--warn); color: #fff; }

  .locked .chip button, .locked .btn-add, .locked #nameInput, .locked .stepper-btn {
    pointer-events: none;
    opacity: 0.45;
  }

  .stepper { display: flex; align-items: center; gap: 14px; }

  .stepper-btn {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    background: rgba(255, 255, 255, 0.55);
    color: var(--ink);
    font-size: 18px;
    cursor: pointer;
  }
  @media (prefers-color-scheme: dark) { .stepper-btn { background: rgba(255, 255, 255, 0.08); } }
  :root[data-theme="dark"] .stepper-btn { background: rgba(255, 255, 255, 0.08); }
  .stepper-btn:hover { border-color: var(--accent); }

  .stepper-value {
    font-family: var(--font-mono);
    font-size: 20px;
    font-variant-numeric: tabular-nums;
    min-width: 24px;
    text-align: center;
  }

  .hint { margin: 8px 0 0; font-size: 12.5px; color: var(--muted); line-height: 1.5; }
  .warning { margin: 0; min-height: 16px; font-size: 12.5px; color: var(--warn); }

  .action-row { display: flex; flex-direction: column; gap: 8px; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--team-4));
    color: var(--accent-ink);
    border: none;
    border-radius: 999px;
    padding: 13px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 12px 24px -10px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .btn-primary:not(:disabled):hover { filter: brightness(1.05); }

  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent-ink); }

  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .board-wrap {
    background: rgba(255, 255, 255, 0.3);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 10px;
    position: relative;
    min-height: 460px;
  }
  @media (prefers-color-scheme: dark) { .board-wrap { background: rgba(255, 255, 255, 0.04); } }
  :root[data-theme="dark"] .board-wrap { background: rgba(255, 255, 255, 0.04); }

  #board { width: 100%; height: 500px; display: block; border-radius: 16px; }

  .speed-toggle {
    display: flex;
    gap: 6px;
    background: rgba(255, 255, 255, 0.35);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
  }
  @media (prefers-color-scheme: dark) { .speed-toggle { background: rgba(255, 255, 255, 0.06); } }
  :root[data-theme="dark"] .speed-toggle { background: rgba(255, 255, 255, 0.06); }

  .speed-btn {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 999px;
    padding: 7px 4px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .speed-btn.is-active {
    background: linear-gradient(135deg, var(--accent), var(--team-4));
    color: var(--accent-ink);
  }
  .speed-btn:hover:not(.is-active) { color: var(--ink); }
  .locked .speed-btn { pointer-events: none; opacity: 0.45; }

  .results {
    margin-top: 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .team-card {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px;
    border-top: 4px solid var(--team-color, var(--accent));
  }
  @media (prefers-color-scheme: dark) { .team-card { background: rgba(255, 255, 255, 0.06); } }
  :root[data-theme="dark"] .team-card { background: rgba(255, 255, 255, 0.06); }

  .team-card h3 {
    margin: 0 0 8px;
    font-size: 14px;
    font-family: var(--font-display);
    color: var(--team-color, var(--accent));
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-weight: 800;
  }
  .team-card h3 span:last-child { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  .team-card ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; min-height: 20px; }

  .team-card li {
    font-size: 14px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.55);
  }
  @media (prefers-color-scheme: dark) { .team-card li { background: rgba(255, 255, 255, 0.09); } }
  :root[data-theme="dark"] .team-card li { background: rgba(255, 255, 255, 0.09); }

  @media (prefers-reduced-motion: no-preference) {
    .team-card li { animation: pop-in 0.35s ease both; }
  }
  @keyframes pop-in {
    from { opacity: 0; transform: translateY(-4px) scale(0.96); }
    to { opacity: 1; transform: none; }
  }

  .team-card .empty-hint { font-size: 12.5px; color: var(--muted-2); padding: 4px 2px; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(40, 30, 55, 0.45);
    backdrop-filter: blur(4px);
    display: grid;
    place-items: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-backdrop[hidden] { display: none; }

  .modal-card {
    width: 100%;
    max-width: 620px;
    max-height: 86vh;
    overflow-y: auto;
    background: var(--sky-1);
    background: linear-gradient(160deg, var(--sky-2), var(--sky-3));
    border: 1px solid var(--panel-edge);
    border-radius: 28px;
    padding: 28px;
    box-shadow: 0 40px 90px -20px rgba(20, 10, 30, 0.45);
  }

  @media (prefers-reduced-motion: no-preference) {
    .modal-card { animation: modal-pop 0.5s cubic-bezier(0.22, 1.4, 0.36, 1) both; }
  }
  @keyframes modal-pop {
    from { opacity: 0; transform: scale(0.85) translateY(10px); }
    to { opacity: 1; transform: none; }
  }

  .modal-card h2 {
    margin: 0 0 2px;
    font-family: var(--font-display);
    font-weight: 800;
    letter-spacing: -0.01em;
    font-size: 38px;
    color: var(--accent);
    text-align: center;
  }
  .modal-card .modal-sub {
    text-align: center;
    margin: 0 0 20px;
    font-size: 12.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-results {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .modal-actions { display: flex; justify-content: center; gap: 10px; }

  .confetti-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
</style>

<div class="cloud cloud-a" aria-hidden="true"></div>
<div class="cloud cloud-b" aria-hidden="true"></div>
<div class="cloud cloud-c" aria-hidden="true"></div>
<canvas class="confetti-layer" id="confetti" aria-hidden="true"></canvas>

<div class="sky-card">
  <header class="banner">
    <h1>Team Draft</h1>
    <p class="subtitle">e스포츠 동호회 팀 편성기</p>
    <svg class="ribbon-wave" viewBox="0 0 300 14" aria-hidden="true">
      <defs>
        <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="var(--accent)" />
          <stop offset="1" stop-color="var(--team-4)" />
        </linearGradient>
      </defs>
      <path d="M0 7 Q 25 0 50 7 T 100 7 T 150 7 T 200 7 T 250 7 T 300 7" fill="none" stroke="url(#waveGrad)" stroke-width="2.5" stroke-linecap="round" />
    </svg>
  </header>

  <div class="stage">
    <aside class="control-panel" id="controlPanel">
      <section class="panel-block">
        <div class="panel-block-head">
          <h2>참가자 명단</h2>
          <span class="count-badge" id="memberCount">11명</span>
        </div>
        <form class="add-row" id="addForm">
          <input type="text" id="nameInput" placeholder="닉네임 입력 후 추가" maxlength="12" autocomplete="off" />
          <button type="submit" class="btn-add">추가</button>
        </form>
        <ul class="chip-list" id="chipList"></ul>
      </section>

      <section class="panel-block">
        <h2>팀 수</h2>
        <div class="stepper">
          <button type="button" id="teamMinus" class="stepper-btn" aria-label="팀 수 감소">−</button>
          <span id="teamCountLabel" class="stepper-value">2</span>
          <button type="button" id="teamPlus" class="stepper-btn" aria-label="팀 수 증가">+</button>
        </div>
        <p class="hint" id="teamHint"></p>
      </section>

      <section class="panel-block">
        <h2>낙하 속도</h2>
        <div class="speed-toggle" id="speedToggle" role="group" aria-label="낙하 속도 선택">
          <button type="button" class="speed-btn" data-speed="0.5">0.5배속</button>
          <button type="button" class="speed-btn is-active" data-speed="1">1배속</button>
          <button type="button" class="speed-btn" data-speed="2">2배속</button>
        </div>
      </section>

      <section class="panel-block">
        <h2>공유 모드 (호스트 전용)</h2>
        <input type="password" id="hostTokenInput" placeholder="GitHub 토큰 붙여넣기 (선택)" autocomplete="off" />
        <p class="hint" id="hostTokenStatus">토큰이 없으면 이 화면은 보기 전용으로 동작해요.</p>
      </section>

      <p class="warning" id="warningMsg" role="alert"></p>

      <div class="action-row">
        <button type="button" id="startBtn" class="btn-primary">드랍 시작</button>
        <button type="button" id="resetBtn" class="btn-ghost" hidden>다시 뽑기</button>
        <button type="button" id="viewResultsBtn" class="btn-ghost" hidden>결과 다시보기</button>
      </div>
    </aside>

    <div class="board-wrap">
      <canvas id="board" aria-label="핀볼 보드 애니메이션"></canvas>
    </div>
  </div>

  <section class="results" id="results" aria-live="polite"></section>
</div>

<div class="modal-backdrop" id="modalBackdrop" hidden>
  <div class="modal-card" id="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
    <h2 id="modalTitle">팀 편성 완료!</h2>
    <p class="modal-sub">오늘의 대진이 확정되었습니다</p>
    <div class="modal-results" id="modalResults"></div>
    <div class="modal-actions">
      <button type="button" class="btn-primary" id="modalCloseBtn">확인</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var TEAM_COLORS = ["--team-1", "--team-2", "--team-3", "--team-4", "--team-5", "--team-6"];
  var TEAM_NAME_POOL = [
    "T1", "Gen.G", "Dplus KIA", "KT 롤스터", "한화생명e스포츠",
    "DRX", "BNK 피어엑스", "농심 레드포스", "OK저축은행 브리온", "광동 프릭스"
  ];
  var MAX_TEAMS = 6;
  var MIN_TEAMS = 2;
  var MAX_MEMBERS = 24;

  var members = [
    "고재형", "이예은", "지한규", "편한슬", "이도현", "조이진",
    "유다현", "임준", "김탁우", "원종훈", "임별"
  ].map(function (name, i) { return { id: i + 1, name: name }; });
  var nextId = members.length + 1;
  var teamCount = 2;
  var teamNames = [];
  var speedMultiplier = 1;
  var BASE_SPEED = 0.5;

  var chipList = document.getElementById("chipList");
  var memberCountEl = document.getElementById("memberCount");
  var nameInput = document.getElementById("nameInput");
  var addForm = document.getElementById("addForm");
  var teamCountLabel = document.getElementById("teamCountLabel");
  var teamHint = document.getElementById("teamHint");
  var teamMinus = document.getElementById("teamMinus");
  var teamPlus = document.getElementById("teamPlus");
  var speedToggle = document.getElementById("speedToggle");
  var hostTokenInput = document.getElementById("hostTokenInput");
  var hostTokenStatus = document.getElementById("hostTokenStatus");
  var warningMsg = document.getElementById("warningMsg");
  var startBtn = document.getElementById("startBtn");
  var resetBtn = document.getElementById("resetBtn");
  var viewResultsBtn = document.getElementById("viewResultsBtn");
  var controlPanel = document.getElementById("controlPanel");
  var resultsEl = document.getElementById("results");
  var boardWrap = document.querySelector(".board-wrap");
  var canvas = document.getElementById("board");
  var ctx = canvas.getContext("2d");
  var modalBackdrop = document.getElementById("modalBackdrop");
  var modalCard = document.getElementById("modalCard");
  var modalResults = document.getElementById("modalResults");
  var modalCloseBtn = document.getElementById("modalCloseBtn");
  var confettiCanvas = document.getElementById("confetti");
  var confettiCtx = confettiCanvas.getContext("2d");

  speedToggle.addEventListener("click", function (e) {
    var btn = e.target.closest(".speed-btn");
    if (!btn) return;
    speedMultiplier = parseFloat(btn.dataset.speed);
    Array.prototype.forEach.call(speedToggle.querySelectorAll(".speed-btn"), function (b) {
      b.classList.toggle("is-active", b === btn);
    });
  });

  // ---------- Cross-device sharing (this repo's state.json as a tiny shared store) ----------
  var REPO_OWNER = "whikebaintres";
  var REPO_NAME = "team-draft";
  var STATE_PATH = "state.json";
  var hostToken = localStorage.getItem("teamDraftHostToken") || "";
  var lastKnownRunId = null;
  var pollInFlight = false;

  hostTokenInput.value = hostToken;
  updateHostTokenStatus(hostToken ? "토큰이 저장되어 있어요. 이 브라우저에서 뽑기를 시작하면 공유돼요." : "토큰이 없으면 이 화면은 보기 전용으로 동작해요.");

  function updateHostTokenStatus(text) { hostTokenStatus.textContent = text; }

  hostTokenInput.addEventListener("change", function () {
    hostToken = hostTokenInput.value.trim();
    if (hostToken) {
      localStorage.setItem("teamDraftHostToken", hostToken);
      updateHostTokenStatus("토큰이 저장되었어요. 이 브라우저에서 뽑기를 시작하면 공유돼요.");
    } else {
      localStorage.removeItem("teamDraftHostToken");
      updateHostTokenStatus("토큰이 없으면 이 화면은 보기 전용으로 동작해요.");
    }
  });

  function b64EncodeUnicode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

  async function publishState(payload) {
    if (!hostToken) return;
    updateHostTokenStatus("공유하는 중…");
    try {
      var apiUrl = "https://api.github.com/repos/" + REPO_OWNER + "/" + REPO_NAME + "/contents/" + STATE_PATH;
      var sha = null;
      var getRes = await fetch(apiUrl, {
        headers: { Authorization: "Bearer " + hostToken, Accept: "application/vnd.github+json" }
      });
      if (getRes.status === 200) {
        var current = await getRes.json();
        sha = current.sha;
      }
      var body = { message: "team draft: update state", content: b64EncodeUnicode(JSON.stringify(payload)) };
      if (sha) body.sha = sha;
      var putRes = await fetch(apiUrl, {
        method: "PUT",
        headers: {
          Authorization: "Bearer " + hostToken,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });
      if (putRes.ok) {
        lastKnownRunId = payload.runId;
        updateHostTokenStatus("공유 완료! 다른 기기에서도 곧 같은 결과가 보일 거예요.");
      } else {
        updateHostTokenStatus("공유 실패 (토큰 권한을 확인해주세요).");
      }
    } catch (e) {
      updateHostTokenStatus("공유 실패 (네트워크 오류).");
    }
  }

  async function pollState() {
    if (pollInFlight || animRunning) return;
    pollInFlight = true;
    try {
      var res = await fetch(STATE_PATH + "?t=" + Date.now(), { cache: "no-store" });
      if (res.ok) {
        var data = await res.json();
        if (lastKnownRunId === null) {
          lastKnownRunId = data.runId || "";
        } else if (data.runId && data.runId !== lastKnownRunId) {
          lastKnownRunId = data.runId;
          replayFromRemote(data);
        }
      }
    } catch (e) {
      // ignore transient network errors
    }
    pollInFlight = false;
  }

  setInterval(pollState, 5000);
  pollState();

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  function teamColorVar(index) { return cssVar(TEAM_COLORS[index % TEAM_COLORS.length]); }

  function renderChips() {
    chipList.innerHTML = "";
    members.forEach(function (m) {
      var li = document.createElement("li");
      li.className = "chip";
      var span = document.createElement("span");
      span.textContent = m.name;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = "×";
      btn.setAttribute("aria-label", m.name + " 삭제");
      btn.addEventListener("click", function () {
        members = members.filter(function (x) { return x.id !== m.id; });
        renderChips();
        validate();
      });
      li.appendChild(span);
      li.appendChild(btn);
      chipList.appendChild(li);
    });
    memberCountEl.textContent = members.length + "명";
  }

  function validate() {
    var n = members.length;
    var base = Math.floor(n / teamCount);
    var rem = n % teamCount;
    if (n === 0) {
      teamHint.textContent = "참가자를 먼저 추가해주세요.";
    } else if (rem === 0) {
      teamHint.textContent = base + "명씩 " + teamCount + "팀으로 나뉩니다.";
    } else {
      teamHint.textContent = rem + "개 팀은 " + (base + 1) + "명, 나머지 팀은 " + base + "명이 됩니다.";
    }

    var ok = true;
    if (n < teamCount) {
      warningMsg.textContent = "최소 " + teamCount + "명이 있어야 " + teamCount + "팀으로 나눌 수 있어요.";
      ok = false;
    } else if (n > MAX_MEMBERS) {
      warningMsg.textContent = "참가자는 최대 " + MAX_MEMBERS + "명까지 가능해요.";
      ok = false;
    } else {
      warningMsg.textContent = "";
    }
    startBtn.disabled = !ok;
    return ok;
  }

  addForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var name = nameInput.value.trim();
    if (!name) return;
    if (members.length >= MAX_MEMBERS) {
      warningMsg.textContent = "참가자는 최대 " + MAX_MEMBERS + "명까지 가능해요.";
      return;
    }
    members.push({ id: nextId++, name: name });
    nameInput.value = "";
    renderChips();
    validate();
  });

  teamMinus.addEventListener("click", function () {
    teamCount = Math.max(MIN_TEAMS, teamCount - 1);
    teamCountLabel.textContent = teamCount;
    validate();
  });
  teamPlus.addEventListener("click", function () {
    teamCount = Math.min(MAX_TEAMS, teamCount + 1);
    teamCountLabel.textContent = teamCount;
    validate();
  });

  function shuffled(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // ---------- Canvas board ----------
  var W = 0, H = 0, DPR = 1;
  var ROWS = 14;
  var BUMPER_ROWS = [2, 5, 9];
  var MARGIN_X = 26, TOP_Y = 50, TRAY_H = 84;
  var pegRowY = [];
  var pegPositions = [];
  var trayY = 0;
  var balls = [];
  var particles = [];
  var teams = [];
  var animRunning = false;
  var startTime = 0;
  var simClock = 0;
  var landedTotal = 0;
  var expectedTotal = 0;
  var climaxActive = false;
  var finalFlash = null;

  function layoutBoard() {
    var rect = boardWrap.getBoundingClientRect();
    var cssW = Math.max(280, rect.width - 20);
    var cssH = 500;
    DPR = window.devicePixelRatio || 1;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width = Math.round(cssW * DPR);
    canvas.height = Math.round(cssH * DPR);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(DPR, DPR);
    W = cssW; H = cssH;
    trayY = H - TRAY_H;

    var rowGap = (trayY - TOP_Y - 20) / (ROWS - 1);
    var pegCols = 11;
    var spacing = (W - 2 * MARGIN_X) / (pegCols - 1);
    pegRowY = [];
    pegPositions = [];
    for (var r = 0; r < ROWS; r++) {
      var y = TOP_Y + r * rowGap;
      pegRowY.push(y);
      var xs = [];
      if (r % 2 === 0) {
        for (var c = 0; c < pegCols; c++) xs.push(MARGIN_X + c * spacing);
      } else {
        for (var c2 = 0; c2 < pegCols - 1; c2++) xs.push(MARGIN_X + spacing / 2 + c2 * spacing);
      }
      pegPositions.push(xs);
    }
  }

  function binCenterX(teamIndex) {
    var binW = W / teamCount;
    return binW * teamIndex + binW / 2;
  }

  function fontStack() {
    return "'Pretendard Variable', 'Malgun Gothic', sans-serif";
  }

  function hexToRgba(hex, alpha) {
    hex = hex.replace("#", "");
    if (hex.length === 3) hex = hex.split("").map(function (c) { return c + c; }).join("");
    var r = parseInt(hex.substring(0, 2), 16);
    var g = parseInt(hex.substring(2, 4), 16);
    var b = parseInt(hex.substring(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
  }

  function drawStatic() {
    ctx.clearRect(0, 0, W, H);

    var glass = ctx.createLinearGradient(0, 0, 0, H);
    glass.addColorStop(0, "rgba(255,255,255,0.10)");
    glass.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = glass;
    ctx.fillRect(0, 0, W, H);

    // chute
    ctx.fillStyle = hexToRgba(cssVar("--accent"), 0.22);
    ctx.beginPath();
    ctx.roundRect(W / 2 - 26, 8, 52, 16, 8);
    ctx.fill();

    // dew-drop pegs
    var pegColor = hexToRgba(cssVar("--accent-2"), 0.65);
    for (var r = 0; r < pegPositions.length; r++) {
      var isBumperRow = BUMPER_ROWS.indexOf(r) !== -1;
      var xs = pegPositions[r];
      for (var i = 0; i < xs.length; i++) {
        ctx.beginPath();
        ctx.arc(xs[i], pegRowY[r], isBumperRow ? 5 : 3.6, 0, Math.PI * 2);
        ctx.fillStyle = isBumperRow ? hexToRgba(cssVar("--accent"), 0.55) : pegColor;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(xs[i] - 1, pegRowY[r] - 1, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.75)";
        ctx.fill();
      }
    }


    // trays
    var binW = W / teamCount;
    for (var t = 0; t < teamCount; t++) {
      var color = teamColorVar(t);
      var x = binW * t;
      ctx.fillStyle = hexToRgba(color, 0.22);
      ctx.beginPath();
      ctx.roundRect(x + 4, trayY, binW - 8, TRAY_H - 8, 14);
      ctx.fill();
      ctx.strokeStyle = hexToRgba(color, 0.6);
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = cssVar("--ink");
      ctx.font = "800 12px " + fontStack();
      ctx.textAlign = "center";
      var name = teamNames[t] || ("TEAM " + (t + 1));
      ctx.fillText(name, x + binW / 2, trayY + 24);

      var info = teams[t];
      var label = info ? (info.landed.length + " / " + info.expected) : "";
      ctx.fillStyle = hexToRgba(cssVar("--muted"), 0.9);
      ctx.font = "600 11px " + fontStack(true);
      ctx.fillText(label, x + binW / 2, trayY + 42);

      if (t > 0) {
        ctx.strokeStyle = hexToRgba(cssVar("--ink"), 0.06);
        ctx.beginPath();
        ctx.moveTo(x, TOP_Y - 10);
        ctx.lineTo(x, trayY + TRAY_H - 8);
        ctx.stroke();
      }
    }

    if (climaxActive) {
      var pulse = 0.3 + 0.35 * Math.sin(performance.now() / 220);
      ctx.save();
      ctx.strokeStyle = hexToRgba(cssVar("--accent"), pulse);
      ctx.lineWidth = 6;
      ctx.strokeRect(3, 3, W - 6, H - 6);
      ctx.restore();
    }
  }

  function makeBalls(order) {
    var releaseInterval = Math.max(220, Math.min(420, 3600 / order.length));
    return order.map(function (m, i) {
      return {
        member: m,
        x: W / 2 + (Math.random() - 0.5) * 16,
        y: 14,
        vx: (Math.random() - 0.5) * 10,
        vy: 68 + Math.random() * 8,
        row: 0,
        released: false,
        releaseAt: i * releaseInterval,
        landed: false,
        fade: 1,
        pegCooldown: 0,
        noisePhase: Math.random() * Math.PI * 2,
        rot: Math.random() * Math.PI * 2,
        targetX: binCenterX(m.teamIndex),
        color: teamColorVar(m.teamIndex)
      };
    });
  }

  function onLanded(ball) {
    var info = teams[ball.member.teamIndex];
    info.landed.push(ball.member.name);
    landedTotal++;
    var li = document.createElement("li");
    li.textContent = ball.member.name;
    info.emptyHintEl.hidden = true;
    info.listEl.appendChild(li);
    info.countEl.textContent = info.landed.length + "명";
    particles.push({ x: ball.x, y: trayY + 6, r: 4, alpha: 0.9, color: ball.color });

    if (landedTotal >= expectedTotal) {
      for (var k = 0; k < 12; k++) {
        var ang = (k / 12) * Math.PI * 2;
        particles.push({
          x: ball.x, y: trayY + 6, r: 3, alpha: 1, color: ball.color,
          vx: Math.cos(ang) * 90, vy: Math.sin(ang) * 90 - 30
        });
      }
      finalFlash = { start: performance.now() };
      finishDraw();
    }
  }

  var BALL_RADIUS = 7;

  function pegCollisions(b, dt) {
    if (b.pegCooldown > 0) { b.pegCooldown -= dt * 1000; return; }
    var nearLo = Math.max(0, b.row - 1);
    var nearHi = Math.min(pegPositions.length - 1, b.row + 1);
    for (var r = nearLo; r <= nearHi; r++) {
      var xs = pegPositions[r];
      var py = pegRowY[r];
      var isBumper = BUMPER_ROWS.indexOf(r) !== -1;
      var pegR = isBumper ? 5 : 3.6;
      var minDist = BALL_RADIUS + pegR;
      for (var i = 0; i < xs.length; i++) {
        var dx = b.x - xs[i], dy = b.y - py;
        if (dx > minDist || dx < -minDist || dy > minDist || dy < -minDist) continue;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0.01 && dist < minDist) {
          var nx = dx / dist, ny = dy / dist;
          var overlap = minDist - dist + 0.5;
          b.x += nx * overlap;
          b.y += ny * overlap;
          var kick = isBumper ? (150 + Math.random() * 70) : (75 + Math.random() * 45);
          b.vx += nx * kick;
          b.vy += ny * kick * 0.5 + 35;
          b.pegCooldown = 80;
          if (isBumper) particles.push({ x: b.x, y: py, r: 3, alpha: 0.9, color: cssVar("--accent") });
          return;
        }
      }
    }
  }

  function resolveCollisions(dt) {
    for (var i = 0; i < balls.length; i++) {
      var a = balls[i];
      if (!a.released || a.landed) continue;
      for (var j = i + 1; j < balls.length; j++) {
        var b = balls[j];
        if (!b.released || b.landed) continue;
        var dx = b.x - a.x, dy = b.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var minDist = 14;
        if (dist > 0.01 && dist < minDist) {
          var overlap = (minDist - dist) / 2;
          var nx = dx / dist, ny = dy / dist;
          a.x -= nx * overlap; a.y -= ny * overlap * 0.4;
          b.x += nx * overlap; b.y += ny * overlap * 0.4;
          var push = 900 * dt;
          a.vx -= nx * push;
          b.vx += nx * push;
        }
      }
    }
  }

  function updateBalls(dt, elapsed, realDt) {
    for (var i = 0; i < balls.length; i++) {
      var b = balls[i];
      if (b.landed) { b.fade -= realDt * 2.2; continue; }
      if (elapsed < b.releaseAt) continue;
      b.released = true;

      if (b.row < pegRowY.length) {
        b.vy += 46 * dt;
        b.y += b.vy * dt;

        // continuous organic sway so the path never looks like discrete snaps
        b.vx += Math.sin(elapsed / 130 + b.noisePhase) * 16 * dt;

        // every peg is a real obstacle: the ball actually collides and
        // bounces off whichever ones it happens to touch on the way down
        pegCollisions(b, dt);

        if (b.y >= pegRowY[b.row]) b.row++;

        // gentle continuous pull toward the fair target, growing with descent -
        // it never overrides the peg bounces, just keeps the ball generally
        // trending toward its team so there's no big last-instant correction
        var progress = b.row / (pegRowY.length - 1);
        b.vx += (b.targetX - b.x) * (0.02 + progress * progress * 0.16) * dt * 60;

        b.x += b.vx * dt;
        b.vx *= 0.99;
        b.rot += b.vx * dt * 0.05;

        var minX = MARGIN_X + 6, maxX = W - MARGIN_X - 6;
        if (b.x < minX) { b.x = minX; b.vx = Math.abs(b.vx) * 0.6; }
        if (b.x > maxX) { b.x = maxX; b.vx = -Math.abs(b.vx) * 0.6; }
        continue;
      }

      // smoothly settle straight into the tray - the ball is already close to
      // its target by now, so only a gentle, constant nudge is needed
      b.vy += 40 * dt;
      b.vy = Math.min(b.vy, 130);
      b.y += b.vy * dt;
      b.x += (b.targetX - b.x) * 0.1;
      b.rot += b.vx * dt * 0.02;

      if (b.y >= trayY - 8) {
        b.x = b.targetX;
        b.y = trayY - 8;
        b.landed = true;
        onLanded(b);
      }
    }
    resolveCollisions(dt);
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      if (pt.vx) pt.x += pt.vx * realDt;
      if (pt.vy) pt.y += pt.vy * realDt;
      pt.r += 60 * realDt;
      pt.alpha -= realDt * 1.6;
      if (pt.alpha <= 0) particles.splice(p, 1);
    }
    balls = balls.filter(function (b) { return b.fade > 0; });
  }

  function drawBalls() {
    var neutralEdge = hexToRgba(cssVar("--ink"), 0.18);
    balls.forEach(function (b) {
      if (!b.released) return;
      ctx.save();
      ctx.globalAlpha = Math.max(0, b.fade);
      var hlx = b.x - Math.cos(b.rot) * 2.2;
      var hly = b.y - Math.sin(b.rot) * 2.2;
      var grad = ctx.createRadialGradient(hlx, hly, 1, b.x, b.y, 7.5);
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.6, "rgba(255,255,255,0.85)");
      grad.addColorStop(1, neutralEdge);
      ctx.beginPath();
      ctx.arc(b.x, b.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      var label = b.member.name;
      ctx.font = "800 17px " + fontStack();
      var labelW = ctx.measureText(label).width + 18;
      var labelH = 25;
      var labelX = b.x - labelW / 2;
      var labelY = b.y - 14 - labelH;

      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.45)";
      ctx.shadowBlur = 6;
      ctx.shadowOffsetY = 1;
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.beginPath();
      ctx.roundRect(labelX, labelY, labelW, labelH, 10);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = "#000000";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, b.x, labelY + labelH / 2 + 0.5);

      ctx.restore();
    });
    particles.forEach(function (p) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });
  }

  function drawFinalFlash() {
    if (!finalFlash) return;
    var dur = 450;
    var t = performance.now() - finalFlash.start;
    if (t > dur) { finalFlash = null; return; }
    var alpha = (1 - t / dur) * 0.55;
    ctx.save();
    ctx.globalAlpha = alpha;
    var g = ctx.createRadialGradient(W / 2, H * 0.4, 10, W / 2, H * 0.4, Math.max(W, H) * 0.7);
    g.addColorStop(0, "#ffffff");
    g.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  function frame(ts) {
    if (!startTime) startTime = ts;
    var rawDeltaMs = frame.last ? ts - frame.last : 16;
    var dt = Math.min(0.032, rawDeltaMs / 1000);
    frame.last = ts;

    var remaining = expectedTotal - landedTotal;
    climaxActive = expectedTotal > 0 && remaining > 0 && remaining <= Math.min(2, expectedTotal);
    var effectiveSpeed = BASE_SPEED * speedMultiplier;
    simClock += rawDeltaMs * effectiveSpeed;
    updateBalls(dt * effectiveSpeed, simClock, dt);
    drawStatic();
    drawBalls();
    drawFinalFlash();

    var stillActive = balls.some(function (b) { return !b.landed || b.fade > 0; }) || !!finalFlash;
    if (stillActive) {
      requestAnimationFrame(frame);
    } else {
      animRunning = false;
    }
  }

  function buildTeamCards(order) {
    resultsEl.innerHTML = "";
    teams = [];
    for (var t = 0; t < teamCount; t++) {
      var expected = order.filter(function (m) { return m.teamIndex === t; }).length;
      var card = document.createElement("div");
      card.className = "team-card";
      card.style.setProperty("--team-color", teamColorVar(t));
      var h3 = document.createElement("h3");
      var nameSpan = document.createElement("span");
      nameSpan.textContent = teamNames[t];
      var countEl = document.createElement("span");
      countEl.textContent = "0명";
      h3.appendChild(nameSpan);
      h3.appendChild(countEl);
      var ul = document.createElement("ul");
      var emptyHint = document.createElement("li");
      emptyHint.className = "empty-hint";
      emptyHint.textContent = "낙하 대기 중…";
      ul.appendChild(emptyHint);
      card.appendChild(h3);
      card.appendChild(ul);
      resultsEl.appendChild(card);
      teams.push({ expected: expected, landed: [], listEl: ul, countEl: countEl, emptyHintEl: emptyHint, name: teamNames[t] });
    }
  }

  function lockPanel(lock) { controlPanel.classList.toggle("locked", lock); }

  function finishDraw() {
    startBtn.hidden = true;
    resetBtn.hidden = false;
    viewResultsBtn.hidden = false;
    openResultModal(true);
  }

  function buildModalResults() {
    modalResults.innerHTML = "";
    teams.forEach(function (info, t) {
      var card = document.createElement("div");
      card.className = "team-card";
      card.style.setProperty("--team-color", teamColorVar(t));
      var h3 = document.createElement("h3");
      var nameSpan = document.createElement("span");
      nameSpan.textContent = info.name;
      var countEl = document.createElement("span");
      countEl.textContent = info.landed.length + "명";
      h3.appendChild(nameSpan);
      h3.appendChild(countEl);
      var ul = document.createElement("ul");
      info.landed.forEach(function (name) {
        var li = document.createElement("li");
        li.textContent = name;
        ul.appendChild(li);
      });
      card.appendChild(h3);
      card.appendChild(ul);
      modalResults.appendChild(card);
    });
  }

  function openResultModal(withConfetti) {
    buildModalResults();
    modalBackdrop.hidden = false;
    modalCard.focus();
    if (withConfetti) launchConfetti();
  }

  function closeModal() { modalBackdrop.hidden = true; }

  modalCloseBtn.addEventListener("click", closeModal);
  modalBackdrop.addEventListener("click", function (e) {
    if (e.target === modalBackdrop) closeModal();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && !modalBackdrop.hidden) closeModal();
  });
  viewResultsBtn.addEventListener("click", function () { openResultModal(false); });

  // ---------- Confetti ----------
  var confettiParticles = [];
  var confettiRunning = false;
  var CONFETTI_COLORS = ["--team-1", "--team-2", "--team-3", "--team-4", "--team-5", "--team-6"];

  function resizeConfettiCanvas() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }

  function launchConfetti() {
    resizeConfettiCanvas();
    confettiParticles = [];
    var colors = CONFETTI_COLORS.map(function (v) { return cssVar(v); });
    var origins = [
      { x: window.innerWidth * 0.08, dir: 1 },
      { x: window.innerWidth * 0.92, dir: -1 }
    ];
    origins.forEach(function (origin) {
      for (var i = 0; i < 70; i++) {
        confettiParticles.push({
          x: origin.x,
          y: window.innerHeight * 0.95,
          vx: origin.dir * (2 + Math.random() * 5) + (Math.random() - 0.5) * 2,
          vy: -(9 + Math.random() * 9),
          rot: Math.random() * Math.PI * 2,
          vr: (Math.random() - 0.5) * 0.3,
          size: 5 + Math.random() * 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          shape: Math.random() < 0.5 ? "rect" : "circle",
          life: 0
        });
      }
    });
    if (!confettiRunning) {
      confettiRunning = true;
      requestAnimationFrame(confettiFrame);
    }
  }

  function confettiFrame() {
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    var alive = false;
    confettiParticles.forEach(function (p) {
      p.vy += 0.32;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.life += 1;
      if (p.y < confettiCanvas.height + 20 && p.life < 260) alive = true;
      confettiCtx.save();
      confettiCtx.globalAlpha = Math.max(0, 1 - p.life / 260);
      confettiCtx.translate(p.x, p.y);
      confettiCtx.rotate(p.rot);
      confettiCtx.fillStyle = p.color;
      if (p.shape === "rect") {
        confettiCtx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
      } else {
        confettiCtx.beginPath();
        confettiCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        confettiCtx.fill();
      }
      confettiCtx.restore();
    });
    if (alive) {
      requestAnimationFrame(confettiFrame);
    } else {
      confettiRunning = false;
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }
  }

  window.addEventListener("resize", function () {
    if (!confettiRunning) resizeConfettiCanvas();
  });

  function runAnimation(order) {
    lockPanel(true);
    buildTeamCards(order);
    landedTotal = 0;
    expectedTotal = order.length;
    particles = [];
    finalFlash = null;
    climaxActive = false;
    startBtn.disabled = true;
    resetBtn.hidden = true;
    viewResultsBtn.hidden = true;

    layoutBoard();
    balls = makeBalls(order);
    startTime = 0;
    frame.last = 0;
    simClock = 0;
    if (!animRunning) {
      animRunning = true;
      requestAnimationFrame(frame);
    }
  }

  function startDraw() {
    if (!validate()) return;
    var order = shuffled(members).map(function (m, i) {
      return { name: m.name, teamIndex: i % teamCount };
    });
    teamNames = shuffled(TEAM_NAME_POOL).slice(0, teamCount);
    runAnimation(order);
    publishState({
      runId: "r" + Date.now() + "-" + Math.random().toString(36).slice(2, 7),
      startedAt: Date.now(),
      teamCount: teamCount,
      teamNames: teamNames,
      order: order
    });
  }

  function replayFromRemote(data) {
    if (animRunning) return;
    teamCount = data.teamCount;
    teamNames = data.teamNames;
    teamCountLabel.textContent = teamCount;
    runAnimation(data.order);
  }

  function resetDraw() {
    lockPanel(false);
    startBtn.hidden = false;
    startBtn.disabled = false;
    resetBtn.hidden = true;
    viewResultsBtn.hidden = true;
    resultsEl.innerHTML = "";
    balls = [];
    particles = [];
    teams = [];
    finalFlash = null;
    climaxActive = false;
    closeModal();
    layoutBoard();
    drawStatic();
    validate();
  }

  startBtn.addEventListener("click", startDraw);
  resetBtn.addEventListener("click", resetDraw);
  window.addEventListener("resize", function () {
    if (!animRunning) { layoutBoard(); drawStatic(); }
  });

  renderChips();
  teamCountLabel.textContent = teamCount;
  teamNames = TEAM_NAME_POOL.slice(0, teamCount);
  validate();
  layoutBoard();
  drawStatic();
})();
</script>
