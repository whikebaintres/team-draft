<title>회원 데이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --bg-alt: #f5f5f7;
    --panel: #f5f5f7;
    --panel-2: #ffffff;
    --line: #d2d2d7;
    --ink: #1d1d1f;
    --ink-dim: #6e6e73;
    --ink-faint: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30;
    --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d;
    --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a;
    --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-border: rgba(255, 255, 255, 0.7);
    --font-body: "Roboto", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #000000; --bg-alt: #1d1d1f; --panel: #1d1d1f; --panel-2: #161617; --line: #38383a;
      --ink: #f5f5f7; --ink-dim: #a1a1a6; --ink-faint: #6e6e73;
      --accent: #2997ff; --accent-hover: #52aeff; --accent-soft: rgba(41, 151, 255, 0.14);
      --danger: #ff453a; --danger-soft: rgba(255, 69, 58, 0.16);
      --good: #32d74b; --good-soft: rgba(50, 215, 75, 0.14);
      --warn: #ffb340; --warn-soft: rgba(255, 179, 64, 0.14);
      --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
      --wash:
        radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
        radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
        radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
      --glass-bg: rgba(30, 30, 32, 0.55); --glass-border: rgba(255, 255, 255, 0.09);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #000000; --bg-alt: #1d1d1f; --panel: #1d1d1f; --panel-2: #161617; --line: #38383a;
    --ink: #f5f5f7; --ink-dim: #a1a1a6; --ink-faint: #6e6e73;
    --accent: #2997ff; --accent-hover: #52aeff; --accent-soft: rgba(41, 151, 255, 0.14);
    --danger: #ff453a; --danger-soft: rgba(255, 69, 58, 0.16);
    --good: #32d74b; --good-soft: rgba(50, 215, 75, 0.14);
    --warn: #ffb340; --warn-soft: rgba(255, 179, 64, 0.14);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
    --glass-bg: rgba(30, 30, 32, 0.55); --glass-border: rgba(255, 255, 255, 0.09);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #ffffff; --bg-alt: #f5f5f7; --panel: #f5f5f7; --panel-2: #ffffff; --line: #d2d2d7;
    --ink: #1d1d1f; --ink-dim: #6e6e73; --ink-faint: #86868b;
    --accent: #0071e3; --accent-hover: #0077ed; --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30; --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d; --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a; --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  /* display를 지정한 요소에서도 hidden 속성이 먹도록 (save-row가 flex라 UA 규칙이 밀린다) */
  [hidden] { display: none !important; }
  body {
    min-height: 100vh;
    background-color: var(--bg);
    background-image: var(--wash);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: var(--font-body); cursor: pointer; }
  button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px 96px; }

  .breadcrumb { text-align: center; margin-bottom: 18px; }
  .breadcrumb a { color: var(--accent); font-size: 0.88rem; font-weight: 500; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  .hero { text-align: center; max-width: 620px; margin: 0 auto 36px; }
  .hero .eyebrow {
    display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4.5vw, 2.5rem); font-weight: 700; letter-spacing: -0.015em;
    line-height: 1.2; margin: 0 0 12px; text-wrap: balance;
  }
  .hero p { font-size: 1rem; line-height: 1.55; color: var(--ink-dim); margin: 0; text-wrap: balance; }

  .panel {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 26px;
    box-shadow: var(--shadow-soft);
  }
  .panel + .panel { margin-top: 16px; }
  .panel-title {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink-faint); margin: 0 0 18px;
  }

  .lock-panel { display: flex; flex-direction: column; gap: 10px; }
  .lock-panel.unlocked { flex-direction: row; align-items: center; padding: 16px 26px; }
  .select-label { font-size: 0.78rem; font-weight: 700; color: var(--ink-faint); letter-spacing: 0.02em; }
  .password-row { display: flex; gap: 8px; }
  .password-input {
    flex: 1; font-family: var(--font-body); font-size: 0.95rem; color: var(--ink);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
  }
  .lock-status { font-size: 0.82rem; color: var(--ink-faint); }
  .lock-status.good { color: var(--good); font-weight: 700; }
  .lock-status.danger { color: var(--danger); font-weight: 600; }

  .btn {
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
    border-radius: 10px; padding: 10px 18px; font-weight: 600; font-size: 0.9rem;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg-alt); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-primary:disabled { background: var(--panel); border-color: var(--line); color: var(--ink-faint); }
  .btn-danger { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); border-color: var(--danger); color: #ffffff; }
  .btn-sm { padding: 6px 12px; font-size: 0.82rem; border-radius: 8px; }

  /* 요약 */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat-cell { text-align: center; }
  .stat-cell .value { display: block; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .stat-cell .label { display: block; font-size: 0.76rem; font-weight: 600; color: var(--ink-faint); margin-top: 4px; }

  /* 정렬 / 액션 바 */
  .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .toolbar .spacer { flex: 1; }
  .select-input {
    font-family: var(--font-body); font-size: 0.88rem; font-weight: 600; color: var(--ink);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px;
  }

  /* 표 */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stat-table { width: 100%; border-collapse: collapse; min-width: 620px; }
  .stat-table th {
    font-size: 0.74rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink-faint); text-align: center; padding: 0 6px 10px; white-space: nowrap;
  }
  .stat-table th.name-col, .stat-table td.name-col { text-align: left; }
  .stat-table td { padding: 9px 6px; text-align: center; border-top: 1px solid var(--line); font-size: 0.92rem; }
  .stat-table tbody tr.detail-row td { border-top: none; padding-top: 0; }
  .stat-table tbody tr:hover:not(.detail-row) { background: var(--accent-soft); }

  .who { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; overflow: hidden;
    background: var(--bg-alt); display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-weight: 700; font-size: 0.82rem; border: 1px solid var(--line);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .who-name { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .who-name button {
    background: none; border: none; padding: 0; font: inherit; color: inherit; text-align: left;
  }
  .who-name button:hover { color: var(--accent); text-decoration: underline; }

  .num-input {
    width: 62px; text-align: center; font-family: var(--font-body); font-size: 0.92rem; font-weight: 700;
    color: var(--ink); background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 4px; -moz-appearance: textfield;
  }
  .num-input::-webkit-outer-spin-button, .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .num-input.changed { border-color: var(--accent); background: var(--accent-soft); }

  .rate { font-weight: 700; }
  .pom-val { font-weight: 700; color: var(--warn); }
  .muted { color: var(--ink-faint); }
  .tag {
    display: inline-block; font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 999px;
    background: var(--warn-soft); color: var(--warn); margin-left: 6px; vertical-align: middle;
  }
  .tag.gray { background: var(--bg-alt); color: var(--ink-faint); }

  /* 상대전적 상세 */
  .h2h-box {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; margin: 4px 0 10px; text-align: left;
  }
  .h2h-title { font-size: 0.78rem; font-weight: 700; color: var(--ink-faint); margin: 0 0 10px; letter-spacing: 0.02em; }
  .h2h-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 6px 16px; }
  .h2h-item { display: flex; justify-content: space-between; gap: 10px; font-size: 0.86rem; }
  .h2h-item .opp { color: var(--ink-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h2h-item .rec { font-weight: 700; white-space: nowrap; }
  .h2h-item .rec .w { color: var(--good); }
  .h2h-item .rec .l { color: var(--danger); }
  .h2h-item .rec .d { color: var(--warn); }

  .save-row { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 22px; }
  .save-btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .save-note { font-size: 0.82rem; color: var(--ink-faint); text-align: center; line-height: 1.5; }
  .save-note.danger { color: var(--danger); font-weight: 600; }
  .save-note.good { color: var(--good); font-weight: 600; }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--ink-dim); }
  .empty-state p { margin: 0 0 4px; }

  @media (max-width: 640px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>

<div class="wrap">
  <div class="breadcrumb"><a href="admin-home.html">← 관리자 대시보드</a></div>

  <div class="hero">
    <span class="eyebrow">E스포츠 동호회</span>
    <h1>회원 데이터</h1>
    <p>회원별 누적 승/패/무와 POM을 확인하고, 필요하면 값을 직접 고칠 수 있어요. 이름을 누르면 상대전적이 펼쳐집니다.</p>
  </div>

  <div id="lockPanel"></div>

  <div class="panel">
    <p class="panel-title">전체 요약</p>
    <div class="stat-grid">
      <div class="stat-cell"><span class="value" id="sumPeople">–</span><span class="label">기록 있는 인원</span></div>
      <div class="stat-cell"><span class="value" id="sumMatches">–</span><span class="label">누적 대결</span></div>
      <div class="stat-cell"><span class="value" id="sumDraws">–</span><span class="label">무승부</span></div>
      <div class="stat-cell"><span class="value" id="sumPom">–</span><span class="label">POM 합계</span></div>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <label class="select-label" for="sortSelect">정렬</label>
      <select id="sortSelect" class="select-input">
        <option value="played">경기 수 많은 순</option>
        <option value="win">승수 많은 순</option>
        <option value="rate">승률 높은 순</option>
        <option value="pom">POM 많은 순</option>
        <option value="name">이름순</option>
      </select>
      <span class="spacer"></span>
      <button class="btn btn-sm" id="editToggleBtn">값 수정하기</button>
    </div>
    <div id="tableArea"><div class="empty-state"><p>불러오는 중…</p></div></div>
    <div class="save-row" id="saveRow" hidden>
      <div class="save-btn-row">
        <button class="btn btn-primary" id="saveBtn">변경사항 저장</button>
        <button class="btn" id="cancelBtn">취소</button>
      </div>
      <span class="save-note" id="saveNote"></span>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var FIREBASE_URL = "https://team-draft-1ab3a-default-rtdb.firebaseio.com";
  var EDIT_PASSWORD = "daft";
  var STORED_MARKER = "@stored";

  var lockPanelEl = document.getElementById("lockPanel");
  var tableAreaEl = document.getElementById("tableArea");
  var saveRowEl = document.getElementById("saveRow");

  var playerStats = {};
  var headToHead = {};
  var members = {};
  var photos = {};
  var sortKey = "played";
  var editMode = false;
  var expanded = null;
  var busy = false;

  var unlocked = false;
  try { unlocked = sessionStorage.getItem("adminUnlocked") === "1"; } catch (e) {}

  function $(id) { return document.getElementById(id); }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function fetchJson(path) {
    return fetch(FIREBASE_URL + path + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .catch(function () { return null; });
  }

  function normalized(name) {
    var s = playerStats[name] || {};
    return {
      win: Math.max(0, parseInt(s.win, 10) || 0),
      loss: Math.max(0, parseInt(s.loss, 10) || 0),
      draw: Math.max(0, parseInt(s.draw, 10) || 0),
      pom: Math.max(0, parseInt(s.pom, 10) || 0)
    };
  }

  function winRate(s) {
    var decided = s.win + s.loss;
    if (!decided) return null;
    return s.win / decided;
  }

  function resolvePhoto(name) {
    var m = members[name];
    if (!m || !m.photo) return null;
    return m.photo === STORED_MARKER ? (photos[name] || null) : m.photo;
  }

  // playerStats에만 있고 회원 목록에 없는 이름(과거 시드 등)도 함께 보여준다.
  function allNames() {
    var set = {};
    Object.keys(members).forEach(function (n) { set[n] = true; });
    Object.keys(playerStats).forEach(function (n) { set[n] = true; });
    return Object.keys(set);
  }

  function sortNames(names) {
    return names.slice().sort(function (a, b) {
      var sa = normalized(a), sb = normalized(b);
      if (sortKey === "name") return a.localeCompare(b, "ko");
      if (sortKey === "win") return (sb.win - sa.win) || a.localeCompare(b, "ko");
      if (sortKey === "pom") return (sb.pom - sa.pom) || a.localeCompare(b, "ko");
      if (sortKey === "rate") {
        var ra = winRate(sa), rb = winRate(sb);
        if (ra === null && rb === null) return a.localeCompare(b, "ko");
        if (ra === null) return 1;
        if (rb === null) return -1;
        return (rb - ra) || a.localeCompare(b, "ko");
      }
      var pa = sa.win + sa.loss + sa.draw, pb = sb.win + sb.loss + sb.draw;
      return (pb - pa) || a.localeCompare(b, "ko");
    });
  }

  function renderSummary() {
    var names = Object.keys(playerStats);
    var matches = 0, draws = 0, pom = 0, people = 0;
    names.forEach(function (n) {
      var s = normalized(n);
      var played = s.win + s.loss + s.draw;
      if (played || s.pom) people++;
      matches += played;
      draws += s.draw;
      pom += s.pom;
    });
    // 한 경기에 두 명이 기록되므로 절반이 실제 대결 수
    $("sumPeople").textContent = people + "명";
    $("sumMatches").textContent = Math.round(matches / 2) + "경기";
    $("sumDraws").textContent = Math.round(draws / 2) + "회";
    $("sumPom").textContent = pom + "회";
  }

  function avatarHtml(name) {
    var src = resolvePhoto(name);
    if (src) return '<span class="avatar"><img src="' + escapeHtml(src) + '" alt="" /></span>';
    return '<span class="avatar">' + escapeHtml(name.slice(0, 1)) + '</span>';
  }

  function nameTag(name) {
    var m = members[name];
    if (!m) return '<span class="tag gray">회원 미등록</span>';
    if (m.active === false) return '<span class="tag">숨김</span>';
    return "";
  }

  function rateText(s) {
    var r = winRate(s);
    if (r === null) return '<span class="muted">–</span>';
    return '<span class="rate">' + Math.round(r * 100) + "%</span>";
  }

  function renderTable() {
    var names = sortNames(allNames());
    if (!names.length) {
      tableAreaEl.innerHTML = '<div class="empty-state"><p>표시할 회원이 없어요.</p><p><a href="admin-members.html">회원 관리</a>에서 먼저 회원을 등록해주세요.</p></div>';
      return;
    }

    var html = '<div class="table-scroll"><table class="stat-table"><thead><tr>' +
      '<th class="name-col">회원</th><th>경기</th><th>승</th><th>패</th><th>무</th><th>승률</th><th>POM</th>' +
      (editMode ? '<th></th>' : '') +
      '</tr></thead><tbody>';

    names.forEach(function (name) {
      var s = normalized(name);
      var played = s.win + s.loss + s.draw;
      var key = encodeURIComponent(name);

      html += '<tr data-row="' + escapeHtml(name) + '">';
      html += '<td class="name-col"><div class="who">' + avatarHtml(name) +
        '<span class="who-name"><button type="button" data-toggle="' + escapeHtml(name) + '">' +
        escapeHtml(name) + '</button>' + nameTag(name) + '</span></div></td>';

      if (editMode) {
        html += '<td class="muted" data-played-for="' + key + '">' + played + '</td>';
        ["win", "loss", "draw", "pom"].forEach(function (field) {
          html += '<td' + (field === "draw" ? "" : "") + '>' +
            '<input type="number" class="num-input" min="0" step="1" inputmode="numeric" ' +
            'data-field="' + field + '" data-name="' + escapeHtml(name) + '" value="' + s[field] + '" />' +
            '</td>';
          if (field === "draw") html += '<td data-rate-for="' + key + '">' + rateText(s) + '</td>';
        });
        html += '<td><button class="btn btn-sm btn-danger" data-reset="' + escapeHtml(name) + '">0으로</button></td>';
      } else {
        html += '<td>' + played + '</td>';
        html += '<td>' + s.win + '</td><td>' + s.loss + '</td><td>' + s.draw + '</td>';
        html += '<td>' + rateText(s) + '</td>';
        html += '<td class="' + (s.pom ? "pom-val" : "muted") + '">' + (s.pom || "–") + '</td>';
      }
      html += '</tr>';

      if (expanded === name) {
        html += '<tr class="detail-row"><td colspan="' + (editMode ? 8 : 7) + '">' + h2hHtml(name) + '</td></tr>';
      }
    });

    html += '</tbody></table></div>';
    tableAreaEl.innerHTML = html;

    if (editMode) bindEditInputs();
  }

  function h2hHtml(name) {
    var items = [];
    Object.keys(headToHead).forEach(function (key) {
      var rec = headToHead[key];
      if (!rec || (rec.a !== name && rec.b !== name)) return;
      var isA = rec.a === name;
      var opp = isA ? rec.b : rec.a;
      var win = (isA ? rec.aWin : rec.bWin) || 0;
      var loss = (isA ? rec.bWin : rec.aWin) || 0;
      var draw = rec.draw || 0;
      if (!win && !loss && !draw) return;
      items.push({ opp: opp, win: win, loss: loss, draw: draw, total: win + loss + draw });
    });

    if (!items.length) {
      return '<div class="h2h-box"><p class="h2h-title">' + escapeHtml(name) + ' 상대전적</p>' +
        '<span class="muted" style="font-size:0.86rem">아직 맞대결 기록이 없어요.</span></div>';
    }

    items.sort(function (a, b) { return b.total - a.total || a.opp.localeCompare(b.opp, "ko"); });

    var list = items.map(function (it) {
      var rec = '<span class="w">' + it.win + '승</span> <span class="l">' + it.loss + '패</span>';
      if (it.draw) rec += ' <span class="d">' + it.draw + '무</span>';
      return '<div class="h2h-item"><span class="opp">vs ' + escapeHtml(it.opp) + '</span>' +
        '<span class="rec">' + rec + '</span></div>';
    }).join("");

    return '<div class="h2h-box"><p class="h2h-title">' + escapeHtml(name) + ' 상대전적 · ' + items.length + '명</p>' +
      '<div class="h2h-list">' + list + '</div></div>';
  }

  function bindEditInputs() {
    var inputs = tableAreaEl.querySelectorAll(".num-input");
    Array.prototype.forEach.call(inputs, function (input) {
      input.addEventListener("input", function () {
        input.value = input.value.replace(/[^0-9]/g, "");
        var name = input.getAttribute("data-name");
        refreshDerived(name);
        markChanged(input, name);
        updateSaveNote();
      });
    });
  }

  function readRow(name) {
    var out = { win: 0, loss: 0, draw: 0, pom: 0 };
    ["win", "loss", "draw", "pom"].forEach(function (field) {
      var input = tableAreaEl.querySelector('.num-input[data-field="' + field + '"][data-name="' + cssEscape(name) + '"]');
      if (input) out[field] = Math.max(0, parseInt(input.value, 10) || 0);
    });
    return out;
  }

  // 이름에 따옴표가 들어갈 일은 없지만, 셀렉터에 그대로 끼우므로 최소한의 이스케이프를 한다.
  function cssEscape(str) { return String(str).replace(/["\\]/g, "\\$&"); }

  function refreshDerived(name) {
    var s = readRow(name);
    var key = encodeURIComponent(name);
    var playedEl = tableAreaEl.querySelector('[data-played-for="' + key + '"]');
    if (playedEl) playedEl.textContent = s.win + s.loss + s.draw;
    var rateEl = tableAreaEl.querySelector('[data-rate-for="' + key + '"]');
    if (rateEl) rateEl.innerHTML = rateText(s);
  }

  function markChanged(input, name) {
    var field = input.getAttribute("data-field");
    var original = normalized(name)[field];
    var value = Math.max(0, parseInt(input.value, 10) || 0);
    input.classList.toggle("changed", value !== original);
  }

  function changedEntries() {
    var patch = {};
    var names = {};
    Array.prototype.forEach.call(tableAreaEl.querySelectorAll(".num-input"), function (input) {
      names[input.getAttribute("data-name")] = true;
    });
    Object.keys(names).forEach(function (name) {
      var next = readRow(name);
      var prev = normalized(name);
      if (next.win !== prev.win || next.loss !== prev.loss || next.draw !== prev.draw || next.pom !== prev.pom) {
        patch[name] = next;
      }
    });
    return patch;
  }

  function updateSaveNote() {
    var note = $("saveNote");
    var count = Object.keys(changedEntries()).length;
    note.className = "save-note";
    note.textContent = count
      ? count + "명의 값이 바뀌었어요. 저장하면 누적 전적에 그대로 반영됩니다."
      : "여기서 고친 값은 누적 전적(playerStats)을 직접 덮어써요. 라운드별 점수는 점수 등록 페이지에서 관리합니다.";
    $("saveBtn").disabled = !count || busy;
  }

  // ---------- 잠금 ----------
  function renderLockPanel() {
    if (unlocked) {
      lockPanelEl.innerHTML = '<div class="panel lock-panel unlocked"><span class="lock-status good">🔓 전적 수정 가능</span></div>';
      return;
    }
    lockPanelEl.innerHTML =
      '<div class="panel lock-panel">' +
      '<label class="select-label" for="pwInput">관리자 비밀번호</label>' +
      '<div class="password-row">' +
      '<input type="password" id="pwInput" class="password-input" placeholder="비밀번호 입력" autocomplete="off" />' +
      '<button class="btn" id="pwBtn">잠금 해제</button>' +
      '</div><span class="lock-status" id="pwNote">조회는 누구나 가능하고, 값 수정만 비밀번호가 필요해요.</span></div>';

    $("pwBtn").addEventListener("click", tryUnlock);
    $("pwInput").addEventListener("keydown", function (e) { if (e.key === "Enter") tryUnlock(); });
  }

  function tryUnlock() {
    var input = $("pwInput");
    var note = $("pwNote");
    if (input.value === EDIT_PASSWORD) {
      unlocked = true;
      try { sessionStorage.setItem("adminUnlocked", "1"); } catch (e) {}
      renderLockPanel();
      syncEditButton();
    } else {
      note.textContent = "비밀번호가 올바르지 않아요.";
      note.className = "lock-status danger";
      input.value = "";
      input.focus();
    }
  }

  function syncEditButton() {
    var btn = $("editToggleBtn");
    btn.disabled = !unlocked;
    btn.textContent = editMode ? "수정 그만두기" : "값 수정하기";
    btn.title = unlocked ? "" : "비밀번호를 입력해야 수정할 수 있어요.";
  }

  function setEditMode(on) {
    editMode = on;
    saveRowEl.hidden = !on;
    syncEditButton();
    renderTable();
    if (on) updateSaveNote();
  }

  // ---------- 저장 ----------
  async function save() {
    if (!unlocked || busy) return;
    var patch = changedEntries();
    var names = Object.keys(patch);
    if (!names.length) return;

    var note = $("saveNote");
    busy = true;
    $("saveBtn").disabled = true;
    note.className = "save-note";
    note.textContent = "저장하는 중…";

    try {
      // 바뀐 사람만 PATCH하므로, 그 사이 다른 사람이 채점한 결과를 덮어쓰지 않는다.
      var res = await fetch(FIREBASE_URL + "/gachaState/playerStats.json", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(patch)
      });
      busy = false;
      if (!res.ok) {
        note.className = "save-note danger";
        note.textContent = "저장 실패 (네트워크 오류). 다시 시도해주세요.";
        $("saveBtn").disabled = false;
        return;
      }
      names.forEach(function (name) { playerStats[name] = patch[name]; });
      setEditMode(false);
      renderSummary();
      note.className = "save-note good";
      note.textContent = names.length + "명의 전적을 저장했어요.";
      saveRowEl.hidden = false;
      $("saveBtn").disabled = true;
      $("cancelBtn").hidden = true;
      setTimeout(function () { saveRowEl.hidden = true; $("cancelBtn").hidden = false; }, 2600);
    } catch (e) {
      busy = false;
      note.className = "save-note danger";
      note.textContent = "저장 실패 (네트워크 오류).";
      $("saveBtn").disabled = false;
    }
  }

  // ---------- 이벤트 ----------
  tableAreaEl.addEventListener("click", function (e) {
    var toggle = e.target.closest("[data-toggle]");
    if (toggle) {
      var name = toggle.getAttribute("data-toggle");
      expanded = (expanded === name) ? null : name;
      renderTable();
      if (editMode) updateSaveNote();
      return;
    }
    var reset = e.target.closest("[data-reset]");
    if (reset) {
      var target = reset.getAttribute("data-reset");
      ["win", "loss", "draw", "pom"].forEach(function (field) {
        var input = tableAreaEl.querySelector('.num-input[data-field="' + field + '"][data-name="' + cssEscape(target) + '"]');
        if (input) { input.value = "0"; markChanged(input, target); }
      });
      refreshDerived(target);
      updateSaveNote();
    }
  });

  $("sortSelect").addEventListener("change", function (e) {
    sortKey = e.target.value;
    renderTable();
    if (editMode) updateSaveNote();
  });
  $("editToggleBtn").addEventListener("click", function () { setEditMode(!editMode); });
  $("saveBtn").addEventListener("click", save);
  $("cancelBtn").addEventListener("click", function () { setEditMode(false); });

  async function loadAll() {
    var res = await Promise.all([
      fetchJson("/gachaState/playerStats.json"),
      fetchJson("/gachaState/headToHead.json"),
      fetchJson("/members.json"),
      fetchJson("/memberPhotos.json")
    ]);
    playerStats = res[0] || {};
    headToHead = res[1] || {};
    members = res[2] || {};
    photos = res[3] || {};
    renderSummary();
    renderTable();
  }

  renderLockPanel();
  syncEditButton();
  loadAll();
})();
</script>
