<title>관리자 점수 등록</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --bg-alt: #f5f5f7;
    --panel: #f5f5f7;
    --panel-2: #ffffff;
    --line: #d2d2d7;
    --ink: #1d1d1f;
    --ink-dim: #6e6e73;
    --ink-faint: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30;
    --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d;
    --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a;
    --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-border: rgba(255, 255, 255, 0.7);
    --font-body: "Roboto", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #000000;
      --bg-alt: #1d1d1f;
      --panel: #1d1d1f;
      --panel-2: #161617;
      --line: #38383a;
      --ink: #f5f5f7;
      --ink-dim: #a1a1a6;
      --ink-faint: #6e6e73;
      --accent: #2997ff;
      --accent-hover: #52aeff;
      --accent-soft: rgba(41, 151, 255, 0.14);
      --danger: #ff453a;
      --danger-soft: rgba(255, 69, 58, 0.16);
      --good: #32d74b;
      --good-soft: rgba(50, 215, 75, 0.14);
      --warn: #ffb340;
      --warn-soft: rgba(255, 179, 64, 0.14);
      --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
      --wash:
        radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
        radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
        radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
      --glass-bg: rgba(30, 30, 32, 0.55);
      --glass-border: rgba(255, 255, 255, 0.09);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #000000; --bg-alt: #1d1d1f; --panel: #1d1d1f; --panel-2: #161617; --line: #38383a;
    --ink: #f5f5f7; --ink-dim: #a1a1a6; --ink-faint: #6e6e73;
    --accent: #2997ff; --accent-hover: #52aeff; --accent-soft: rgba(41, 151, 255, 0.14);
    --danger: #ff453a; --danger-soft: rgba(255, 69, 58, 0.16);
    --good: #32d74b; --good-soft: rgba(50, 215, 75, 0.14);
    --warn: #ffb340; --warn-soft: rgba(255, 179, 64, 0.14);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
    --glass-bg: rgba(30, 30, 32, 0.55); --glass-border: rgba(255, 255, 255, 0.09);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #ffffff; --bg-alt: #f5f5f7; --panel: #f5f5f7; --panel-2: #ffffff; --line: #d2d2d7;
    --ink: #1d1d1f; --ink-dim: #6e6e73; --ink-faint: #86868b;
    --accent: #0071e3; --accent-hover: #0077ed; --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30; --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d; --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a; --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background-color: var(--bg);
    background-image: var(--wash);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: var(--font-body); cursor: pointer; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 56px 24px 96px; }

  .hero { text-align: center; max-width: 560px; margin: 0 auto 40px; }
  .hero .eyebrow {
    display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4.5vw, 2.5rem); font-weight: 700; letter-spacing: -0.015em;
    line-height: 1.2; margin: 0 0 12px; text-wrap: balance;
  }
  .hero p { font-size: 1rem; line-height: 1.55; color: var(--ink-dim); margin: 0; text-wrap: balance; }
  .hero a { color: var(--accent); }

  .panel {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 26px;
    box-shadow: var(--shadow-soft);
  }
  .panel + .panel { margin-top: 16px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-dim); }
  .empty-state p { margin: 0 0 4px; }

  .draft-meta {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 12px;
  }

  .team-block-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .team-block-head .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--team-color, var(--accent)); }
  .team-block-head .name { font-weight: 700; font-size: 1.02rem; color: var(--team-color, var(--ink)); }

  .member-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 9px 0; border-top: 1px solid var(--line);
  }
  .member-row:first-of-type { border-top: none; }
  .member-row .name { font-size: 0.92rem; font-weight: 600; }

  .segmented { display: inline-flex; gap: 6px; }
  .segmented input { position: absolute; opacity: 0; width: 1px; height: 1px; }
  .segmented label {
    font-size: 0.78rem; font-weight: 700; padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--ink-dim); background: var(--panel-2);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .segmented input:focus-visible + label { outline: 2px solid var(--accent); outline-offset: 1px; }
  .segmented input[value="win"]:checked + label { background: var(--good-soft); border-color: var(--good); color: var(--good); }
  .segmented input[value="loss"]:checked + label { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
  .segmented input[value="draw"]:checked + label { background: var(--warn-soft); border-color: var(--warn); color: var(--warn); }

  .pom-list { display: flex; flex-direction: column; gap: 2px; }
  .pom-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-radius: 8px;
    cursor: pointer;
  }
  .pom-row:hover { background: var(--bg-alt); }
  .pom-row input { accent-color: var(--accent); }
  .pom-row .name { font-size: 0.9rem; font-weight: 600; }
  .pom-row .team-tag { font-size: 0.72rem; color: var(--ink-faint); }

  .btn {
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
    border-radius: 10px; padding: 10px 18px; font-weight: 600; font-size: 0.9rem;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg-alt); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; background: var(--panel); border-color: var(--line); color: var(--ink-faint); }
  .link-btn { background: none; border: none; color: var(--accent); font-weight: 500; font-size: 0.92rem; padding: 6px 0; }
  .link-btn:hover { color: var(--accent-hover); text-decoration: underline; }

  .submit-row { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 24px; }
  .submit-note { font-size: 0.82rem; color: var(--ink-faint); text-align: center; }

  .result-summary .member-row .badge {
    font-size: 0.74rem; font-weight: 700; padding: 3px 10px; border-radius: 999px;
  }
  .badge.win { background: var(--good-soft); color: var(--good); }
  .badge.loss { background: var(--danger-soft); color: var(--danger); }
  .badge.draw { background: var(--warn-soft); color: var(--warn); }
  .badge.none { background: var(--bg-alt); color: var(--ink-faint); }
  .pom-flag { font-size: 0.7rem; font-weight: 700; color: var(--accent); margin-left: 8px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>

<div class="wrap">
  <div class="hero">
    <span class="eyebrow">E스포츠 동호회</span>
    <h1>관리자 점수 등록</h1>
    <p id="heroSub">최근 드래프트 결과를 확인하고, 실제 경기 후 승/패/무와 POM을 등록하세요. <a href="gacha.html">드래프트 페이지로 이동 →</a></p>
  </div>

  <div id="content"></div>
</div>

<script>
(function () {
  "use strict";

  var FIREBASE_URL = "https://team-draft-1ab3a-default-rtdb.firebaseio.com";
  var STATE_PATH = "/gachaState.json";

  var contentEl = document.getElementById("content");

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  var stateData = null; // { playerStats, headToHead, latestDraft }
  var reScoring = false;

  function loadState() {
    contentEl.innerHTML = '<div class="empty-state"><p>불러오는 중…</p></div>';
    fetch(FIREBASE_URL + STATE_PATH + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (res) { return res.ok ? res.json() : { playerStats: {}, headToHead: {}, latestDraft: null }; })
      .then(function (data) {
        stateData = data || { playerStats: {}, headToHead: {}, latestDraft: null };
        reScoring = false;
        render();
      })
      .catch(function () {
        contentEl.innerHTML = '<div class="empty-state"><p>불러오기 실패. 새로고침해보세요.</p></div>';
      });
  }

  function allMembers(draft) {
    var list = [];
    draft.teams.forEach(function (team) {
      team.members.forEach(function (m) {
        list.push({ name: m, team: team });
      });
    });
    return list;
  }

  function render() {
    if (!stateData || !stateData.latestDraft) {
      contentEl.innerHTML =
        '<div class="panel"><div class="empty-state">' +
        '<p>아직 등록할 드래프트 결과가 없어요.</p>' +
        '<p><a href="gacha.html">드래프트 페이지</a>에서 먼저 팀을 뽑아주세요.</p>' +
        '</div></div>';
      return;
    }
    var draft = stateData.latestDraft;
    if (draft.scored && !reScoring) {
      renderSummary(draft);
    } else {
      renderForm(draft);
    }
  }

  function renderSummary(draft) {
    var html = draft.yearMonth ? '<p class="draft-meta">' + escapeHtml(draft.yearMonth) + ' 드래프트</p>' : "";
    html += '<div class="panel result-summary">';
    draft.teams.forEach(function (team) {
      html += '<div class="team-block-head" style="--team-color:' + team.color + '"><span class="dot"></span><span class="name">' + escapeHtml(team.name) + '</span></div>';
      team.members.forEach(function (m) {
        var r = (draft.results && draft.results[m]) || {};
        var outcome = r.outcome || "none";
        var label = outcome === "win" ? "승" : outcome === "loss" ? "패" : outcome === "draw" ? "무" : "미입력";
        html += '<div class="member-row"><span class="name">' + escapeHtml(m) + (r.pom ? '<span class="pom-flag">POM</span>' : '') + '</span><span class="badge ' + outcome + '">' + label + '</span></div>';
      });
    });
    html += '</div>';
    html += '<div class="submit-row"><button class="link-btn" id="rescoreBtn">다시 채점하기 ›</button></div>';
    contentEl.innerHTML = html;
    document.getElementById("rescoreBtn").addEventListener("click", function () {
      reScoring = true;
      render();
    });
  }

  function renderForm(draft) {
    var prevResults = (reScoring && draft.results) || {};
    var html = draft.yearMonth ? '<p class="draft-meta">' + escapeHtml(draft.yearMonth) + ' 드래프트</p>' : "";
    draft.teams.forEach(function (team) {
      html += '<div class="panel"><div class="team-block-head" style="--team-color:' + team.color + '"><span class="dot"></span><span class="name">' + escapeHtml(team.name) + '</span></div>';
      team.members.forEach(function (m) {
        var prev = prevResults[m] || {};
        var safeName = escapeHtml(m);
        var groupName = "outcome__" + encodeURIComponent(m);
        html += '<div class="member-row"><span class="name">' + safeName + '</span><div class="segmented">' +
          radioOpt(groupName, "win", "승", prev.outcome === "win") +
          radioOpt(groupName, "loss", "패", prev.outcome === "loss") +
          radioOpt(groupName, "draw", "무", prev.outcome === "draw") +
          '</div></div>';
      });
      html += '</div>';
    });

    html += '<div class="panel"><div class="team-block-head"><span class="name">POM (Player of the Match)</span></div><div class="pom-list">';
    var members = allMembers(draft);
    var anyPomChecked = members.some(function (m) { return prevResults[m.name] && prevResults[m.name].pom; });
    html += '<label class="pom-row"><input type="radio" name="pom" value="" ' + (anyPomChecked ? "" : "checked") + ' /><span class="name">POM 없음</span></label>';
    members.forEach(function (m) {
      var checked = prevResults[m.name] && prevResults[m.name].pom;
      html += '<label class="pom-row"><input type="radio" name="pom" value="' + encodeURIComponent(m.name) + '" ' + (checked ? "checked" : "") + ' /><span class="name">' + escapeHtml(m.name) + '</span><span class="team-tag">' + escapeHtml(m.team.name) + '</span></label>';
    });
    html += '</div></div>';

    html += '<div class="submit-row"><button class="btn btn-primary" id="submitBtn">점수 등록하기</button><span class="submit-note" id="submitNote"></span></div>';

    contentEl.innerHTML = html;
    updateSubmitState();

    document.getElementById("submitBtn").addEventListener("click", submitScores);
  }

  function radioOpt(groupName, value, label, checked) {
    var id = groupName + "__" + value;
    return '<input type="radio" name="' + groupName + '" id="' + id + '" value="' + value + '" ' + (checked ? "checked" : "") + ' />' +
      '<label for="' + id + '">' + label + '</label>';
  }

  function updateSubmitState() {
    var btn = document.getElementById("submitBtn");
    var note = document.getElementById("submitNote");
    if (!btn) return;
    btn.disabled = false;
    note.textContent = "입력하지 않은 인원은 이번엔 기록되지 않아요 (참고용).";
  }

  async function fetchLatestState() {
    var res = await fetch(FIREBASE_URL + STATE_PATH + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) return null;
    var data = await res.json();
    if (!data) data = { playerStats: {}, headToHead: {}, latestDraft: null };
    if (!data.headToHead) data.headToHead = {};
    if (!data.playerStats) data.playerStats = {};
    return { data: data };
  }

  // pairs: [[nameX, nameY], ...], resultsMap: { name: {outcome, pom} }, sign: +1 apply / -1 reverse
  function applyHeadToHeadDelta(pairs, resultsMap, sign, headToHead) {
    if (!pairs || !pairs.length) return;
    pairs.forEach(function (pair) {
      var nameX = pair[0], nameY = pair[1];
      var rx = resultsMap[nameX], ry = resultsMap[nameY];
      if (!rx || !ry || !rx.outcome || !ry.outcome) return;
      var key = nameX + "|" + nameY;
      var altKey = nameY + "|" + nameX;
      var rec = headToHead[key] || headToHead[altKey];
      if (!rec) {
        rec = { a: nameX, b: nameY, aWin: 0, bWin: 0, draw: 0 };
        headToHead[key] = rec;
      }
      var aIsX = (rec.a === nameX);
      if (rx.outcome === "draw" && ry.outcome === "draw") {
        rec.draw = Math.max(0, rec.draw + sign);
      } else if (rx.outcome === "win" && ry.outcome === "loss") {
        if (aIsX) rec.aWin = Math.max(0, rec.aWin + sign); else rec.bWin = Math.max(0, rec.bWin + sign);
      } else if (rx.outcome === "loss" && ry.outcome === "win") {
        if (aIsX) rec.bWin = Math.max(0, rec.bWin + sign); else rec.aWin = Math.max(0, rec.aWin + sign);
      }
      // 그 외 조합(둘 다 승/패, 한쪽만 입력 등)은 상대전적이 애매해지므로 건너뜀
    });
  }

  async function submitScores() {
    var note = document.getElementById("submitNote");
    note.textContent = "등록하는 중…";

    try {
      var fresh = await fetchLatestState();
      if (!fresh || !fresh.data.latestDraft) {
        note.textContent = "등록 실패 (최신 데이터를 불러오지 못했어요).";
        return;
      }
      var draft = fresh.data.latestDraft;
      var playerStats = fresh.data.playerStats || {};
      var headToHead = fresh.data.headToHead || {};

      if (draft.scored && draft.results) {
        Object.keys(draft.results).forEach(function (name) {
          var r = draft.results[name];
          var s = playerStats[name];
          if (!s) return;
          if (r.outcome === "win") s.win = Math.max(0, s.win - 1);
          else if (r.outcome === "loss") s.loss = Math.max(0, s.loss - 1);
          else if (r.outcome === "draw") s.draw = Math.max(0, s.draw - 1);
          if (r.pom) s.pom = Math.max(0, s.pom - 1);
        });
        applyHeadToHeadDelta(draft.pairs, draft.results, -1, headToHead);
      }

      var newResults = {};
      allMembers(draft).forEach(function (m) {
        var groupName = "outcome__" + encodeURIComponent(m.name);
        var checked = document.querySelector('input[name="' + groupName + '"]:checked');
        if (!checked) return;
        var outcome = checked.value;
        if (!playerStats[m.name]) playerStats[m.name] = { win: 0, loss: 0, draw: 0, pom: 0 };
        if (outcome === "win") playerStats[m.name].win++;
        else if (outcome === "loss") playerStats[m.name].loss++;
        else if (outcome === "draw") playerStats[m.name].draw++;
        newResults[m.name] = { outcome: outcome, pom: false };
      });

      var pomChecked = document.querySelector('input[name="pom"]:checked');
      var pomValue = pomChecked ? decodeURIComponent(pomChecked.value) : "";
      if (pomValue) {
        if (!playerStats[pomValue]) playerStats[pomValue] = { win: 0, loss: 0, draw: 0, pom: 0 };
        playerStats[pomValue].pom++;
        if (!newResults[pomValue]) newResults[pomValue] = { outcome: null, pom: true };
        else newResults[pomValue].pom = true;
      }

      applyHeadToHeadDelta(draft.pairs, newResults, 1, headToHead);

      draft.scored = true;
      draft.results = newResults;
      fresh.data.playerStats = playerStats;
      fresh.data.headToHead = headToHead;
      fresh.data.latestDraft = draft;

      var putRes = await fetch(FIREBASE_URL + STATE_PATH, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(fresh.data)
      });

      if (putRes.ok) {
        stateData = fresh.data;
        reScoring = false;
        render();
      } else {
        note.textContent = "등록 실패 (네트워크 오류).";
      }
    } catch (e) {
      note.textContent = "등록 실패 (네트워크 오류).";
    }
  }

  loadState();
})();
</script>
