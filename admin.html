<title>관리자 점수 등록</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --bg-alt: #f5f5f7;
    --panel: #f5f5f7;
    --panel-2: #ffffff;
    --line: #d2d2d7;
    --ink: #1d1d1f;
    --ink-dim: #6e6e73;
    --ink-faint: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30;
    --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d;
    --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a;
    --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-border: rgba(255, 255, 255, 0.7);
    --font-body: "Roboto", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #000000;
      --bg-alt: #1d1d1f;
      --panel: #1d1d1f;
      --panel-2: #161617;
      --line: #38383a;
      --ink: #f5f5f7;
      --ink-dim: #a1a1a6;
      --ink-faint: #6e6e73;
      --accent: #2997ff;
      --accent-hover: #52aeff;
      --accent-soft: rgba(41, 151, 255, 0.14);
      --danger: #ff453a;
      --danger-soft: rgba(255, 69, 58, 0.16);
      --good: #32d74b;
      --good-soft: rgba(50, 215, 75, 0.14);
      --warn: #ffb340;
      --warn-soft: rgba(255, 179, 64, 0.14);
      --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
      --wash:
        radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
        radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
        radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
      --glass-bg: rgba(30, 30, 32, 0.55);
      --glass-border: rgba(255, 255, 255, 0.09);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #000000; --bg-alt: #1d1d1f; --panel: #1d1d1f; --panel-2: #161617; --line: #38383a;
    --ink: #f5f5f7; --ink-dim: #a1a1a6; --ink-faint: #6e6e73;
    --accent: #2997ff; --accent-hover: #52aeff; --accent-soft: rgba(41, 151, 255, 0.14);
    --danger: #ff453a; --danger-soft: rgba(255, 69, 58, 0.16);
    --good: #32d74b; --good-soft: rgba(50, 215, 75, 0.14);
    --warn: #ffb340; --warn-soft: rgba(255, 179, 64, 0.14);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.4), 0 16px 32px -16px rgba(0, 0, 0, 0.6);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 120, 200, 0.32), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(30, 190, 165, 0.26), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(60, 140, 255, 0.18), transparent 60%);
    --glass-bg: rgba(30, 30, 32, 0.55); --glass-border: rgba(255, 255, 255, 0.09);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #ffffff; --bg-alt: #f5f5f7; --panel: #f5f5f7; --panel-2: #ffffff; --line: #d2d2d7;
    --ink: #1d1d1f; --ink-dim: #6e6e73; --ink-faint: #86868b;
    --accent: #0071e3; --accent-hover: #0077ed; --accent-soft: rgba(0, 113, 227, 0.08);
    --danger: #ff3b30; --danger-soft: rgba(255, 59, 48, 0.1);
    --good: #248a3d; --good-soft: rgba(36, 138, 61, 0.1);
    --warn: #b9791a; --warn-soft: rgba(185, 121, 26, 0.1);
    --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 28px -16px rgba(0, 0, 0, 0.14);
    --wash:
      radial-gradient(1100px circle at 12% -10%, rgba(0, 149, 217, 0.16), transparent 55%),
      radial-gradient(900px circle at 92% 4%, rgba(45, 200, 180, 0.14), transparent 55%),
      radial-gradient(1200px circle at 50% 110%, rgba(100, 170, 255, 0.10), transparent 60%);
    --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background-color: var(--bg);
    background-image: var(--wash);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: var(--font-body); cursor: pointer; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px 96px; }

  .breadcrumb { text-align: center; margin-bottom: 18px; }
  .breadcrumb a { color: var(--accent); font-size: 0.88rem; font-weight: 500; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  .hero { text-align: center; max-width: 560px; margin: 0 auto 40px; }
  .hero .eyebrow {
    display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4.5vw, 2.5rem); font-weight: 700; letter-spacing: -0.015em;
    line-height: 1.2; margin: 0 0 12px; text-wrap: balance;
  }
  .hero p { font-size: 1rem; line-height: 1.55; color: var(--ink-dim); margin: 0; text-wrap: balance; }
  .hero a { color: var(--accent); }

  .panel {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 26px;
    box-shadow: var(--shadow-soft);
  }
  .panel + .panel { margin-top: 16px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-dim); }
  .empty-state p { margin: 0 0 4px; }

  .draft-meta {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 12px;
  }

  /* 년월 선택 패널 */
  .select-panel { display: flex; flex-direction: column; gap: 8px; }
  .select-label {
    font-size: 0.78rem; font-weight: 700; color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .month-select {
    font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; color: var(--ink);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; width: 100%;
  }

  /* 비밀번호 잠금 패널 */
  .lock-panel { display: flex; flex-direction: column; gap: 10px; }
  .lock-panel.unlocked { flex-direction: row; align-items: center; padding: 16px 26px; }
  .password-row { display: flex; gap: 8px; }
  .password-input {
    flex: 1; font-family: var(--font-body); font-size: 0.95rem; color: var(--ink);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
  }
  .lock-status { font-size: 0.82rem; color: var(--ink-faint); }
  .lock-status.good { color: var(--good); font-weight: 700; }
  .lock-status.danger { color: var(--danger); font-weight: 600; }

  /* 라운드 카드 */
  .round-label {
    text-align: center; font-size: 0.76rem; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--ink-faint); margin: 0 0 14px;
  }
  .round-match { display: flex; align-items: center; gap: 12px; }
  .round-side {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;
    text-align: center; min-width: 0;
  }
  .round-side .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--team-color, var(--accent)); }
  .round-side .name { font-size: 0.95rem; font-weight: 700; color: var(--team-color, var(--ink)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
  .round-vs { font-size: 0.78rem; font-weight: 800; color: var(--ink-faint); flex-shrink: 0; }

  .score-input {
    width: 120px; text-align: center; font-family: var(--font-body); font-size: 1.05rem; font-weight: 700;
    color: var(--ink); background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 6px; -moz-appearance: textfield;
  }
  .score-input::-webkit-outer-spin-button, .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .score-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .score-value { font-size: 1.05rem; font-weight: 700; color: var(--ink); }

  .badge {
    font-size: 0.74rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap;
  }
  .badge.win { background: var(--good-soft); color: var(--good); }
  .badge.loss { background: var(--danger-soft); color: var(--danger); }
  .badge.draw { background: var(--warn-soft); color: var(--warn); }
  .badge.none { background: var(--bg-alt); color: var(--ink-faint); }

  .btn {
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
    border-radius: 10px; padding: 10px 18px; font-weight: 600; font-size: 0.9rem;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg-alt); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; background: var(--panel); border-color: var(--line); color: var(--ink-faint); }
  .btn-danger { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); border-color: var(--danger); color: #ffffff; }
  .btn-danger:disabled { opacity: 0.35; cursor: not-allowed; background: var(--panel); border-color: var(--line); color: var(--ink-faint); }
  .link-btn { background: none; border: none; color: var(--accent); font-weight: 500; font-size: 0.92rem; padding: 6px 0; }
  .link-btn:hover { color: var(--accent-hover); text-decoration: underline; }

  .submit-row { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 24px; }
  .submit-btn-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .submit-note { font-size: 0.82rem; color: var(--ink-faint); text-align: center; }

  @media (max-width: 480px) {
    .round-match { flex-direction: column; }
    .round-vs { order: 2; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>

<div class="wrap">
  <div class="breadcrumb"><a href="admin-home.html">← 관리자 대시보드</a></div>

  <div class="hero">
    <span class="eyebrow">E스포츠 동호회</span>
    <h1>관리자 점수 등록</h1>
    <p id="heroSub">년월을 선택해 대진표를 확인하고, 라운드별로 두 선수의 점수를 입력하면 승/패/무가 자동으로 기록돼요. <a href="gacha.html">드래프트 페이지로 이동 →</a></p>
  </div>

  <div id="monthPanel"></div>
  <div id="lockPanel"></div>
  <div id="content"></div>
</div>

<script>
(function () {
  "use strict";

  var FIREBASE_URL = "https://team-draft-1ab3a-default-rtdb.firebaseio.com";
  var STATE_PATH = "/gachaState.json";
  var EDIT_PASSWORD = "daft";

  var monthPanelEl = document.getElementById("monthPanel");
  var lockPanelEl = document.getElementById("lockPanel");
  var contentEl = document.getElementById("content");

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  var POSITION_NAMES = ["선봉전", "차봉전", "중견전", "부장전", "대장전"];
  function positionLabel(pairIndex, totalPairs) {
    var list;
    if (totalPairs === 4) {
      list = ["선봉전", "차봉전", "부장전", "대장전"];
    } else if (totalPairs >= 5 || totalPairs <= 0) {
      list = POSITION_NAMES;
    } else {
      list = POSITION_NAMES.slice(0, totalPairs - 1).concat("대장전");
    }
    return pairIndex < list.length ? list[pairIndex] : (pairIndex + 1) + "번째 대결";
  }

  var stateData = null; // { playerStats, headToHead, drafts, latestDraft }
  var selectedYearMonth = null;
  var reScoring = false;
  var unlocked = false;
  try { unlocked = sessionStorage.getItem("adminUnlocked") === "1"; } catch (e) {}

  // 새 데이터는 drafts[년월]에 쌓인다. latestDraft는 이 기능 도입 이전에 기록된 데이터를 위한
  // 마이그레이션 폴백일 뿐이므로, drafts에 아직 없는 경우에만 합쳐 보여준다.
  function collectDrafts(data) {
    var map = {};
    if (data && data.drafts) {
      Object.keys(data.drafts).forEach(function (k) { map[k] = data.drafts[k]; });
    }
    if (data && data.latestDraft && data.latestDraft.yearMonth && !map[data.latestDraft.yearMonth]) {
      map[data.latestDraft.yearMonth] = data.latestDraft;
    }
    return map;
  }

  function allMembers(draft) {
    var list = [];
    draft.teams.forEach(function (team) {
      team.members.forEach(function (m) {
        list.push({ name: m, team: team });
      });
    });
    return list;
  }

  function loadState() {
    contentEl.innerHTML = '<div class="empty-state"><p>불러오는 중…</p></div>';
    fetch(FIREBASE_URL + STATE_PATH + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (res) { return res.ok ? res.json() : null; })
      .then(function (data) {
        stateData = data || { playerStats: {}, headToHead: {}, drafts: {}, latestDraft: null };
        reScoring = false;
        renderMonthPanel();
        renderLockPanel();
        renderContent();
      })
      .catch(function () {
        contentEl.innerHTML = '<div class="empty-state"><p>불러오기 실패. 새로고침해보세요.</p></div>';
      });
  }

  function renderMonthPanel() {
    var draftsMap = collectDrafts(stateData);
    var keys = Object.keys(draftsMap).sort(function (a, b) {
      return (draftsMap[b].createdAt || 0) - (draftsMap[a].createdAt || 0);
    });
    if (!keys.length) { monthPanelEl.innerHTML = ""; return; }
    if (!selectedYearMonth || keys.indexOf(selectedYearMonth) === -1) selectedYearMonth = keys[0];

    var opts = keys.map(function (k) {
      var tag = draftsMap[k].scored ? " · 채점 완료" : " · 미채점";
      return '<option value="' + escapeHtml(k) + '"' + (k === selectedYearMonth ? " selected" : "") + '>' + escapeHtml(k) + tag + '</option>';
    }).join("");

    monthPanelEl.innerHTML =
      '<div class="panel select-panel"><label class="select-label" for="monthSelect">조회할 년월</label>' +
      '<select id="monthSelect" class="month-select">' + opts + '</select></div>';

    document.getElementById("monthSelect").addEventListener("change", function (e) {
      selectedYearMonth = e.target.value;
      reScoring = false;
      renderContent();
    });
  }

  function renderLockPanel() {
    if (unlocked) {
      lockPanelEl.innerHTML = '<div class="panel lock-panel unlocked"><span class="lock-status good">🔓 점수 수정 가능</span></div>';
      return;
    }
    lockPanelEl.innerHTML =
      '<div class="panel lock-panel">' +
      '<label class="select-label" for="pwInput">점수 수정 비밀번호</label>' +
      '<div class="password-row">' +
      '<input type="password" id="pwInput" class="password-input" placeholder="비밀번호 입력" autocomplete="off" />' +
      '<button class="btn" id="pwBtn">잠금 해제</button>' +
      '</div><span class="lock-status" id="pwNote">비밀번호를 입력해야 점수를 등록/수정할 수 있어요.</span></div>';

    document.getElementById("pwBtn").addEventListener("click", tryUnlock);
    document.getElementById("pwInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") tryUnlock();
    });
  }

  function tryUnlock() {
    var input = document.getElementById("pwInput");
    var note = document.getElementById("pwNote");
    if (input.value === EDIT_PASSWORD) {
      unlocked = true;
      try { sessionStorage.setItem("adminUnlocked", "1"); } catch (e) {}
      renderLockPanel();
      renderContent();
    } else {
      note.textContent = "비밀번호가 올바르지 않아요.";
      note.className = "lock-status danger";
      input.value = "";
      input.focus();
    }
  }

  function renderContent() {
    var draftsMap = collectDrafts(stateData);
    var draft = draftsMap[selectedYearMonth];
    if (!draft) {
      contentEl.innerHTML =
        '<div class="panel"><div class="empty-state">' +
        '<p>아직 등록할 드래프트 결과가 없어요.</p>' +
        '<p><a href="gacha.html">드래프트 페이지</a>에서 먼저 팀을 뽑아주세요.</p>' +
        '</div></div>';
      return;
    }
    if (draft.scored && !reScoring) {
      renderSummary(draft);
    } else {
      renderForm(draft);
    }
  }

  function memberTeamMap(draft) {
    var map = {};
    draft.teams.forEach(function (team) {
      team.members.forEach(function (m) { map[m] = team; });
    });
    return map;
  }

  function setBadge(el, outcome) {
    if (!el) return;
    var label = outcome === "win" ? "승" : outcome === "loss" ? "패" : outcome === "draw" ? "무" : "미입력";
    el.className = "badge " + (outcome || "none");
    el.textContent = label;
  }

  function renderForm(draft) {
    var prevResults = (reScoring && draft.results) || {};
    var teamOf = memberTeamMap(draft);
    var html = draft.yearMonth ? '<p class="draft-meta">' + escapeHtml(draft.yearMonth) + ' 드래프트</p>' : "";

    draft.pairs.forEach(function (pair, idx) {
      var nameA = pair[0], nameB = pair[1];
      var label = positionLabel(idx, draft.pairs.length);
      html += '<div class="panel round-card">';
      html += '<p class="round-label">' + escapeHtml(label) + '</p>';
      html += '<div class="round-match">';
      html += roundSideEditable(nameA, teamOf[nameA] || {}, prevResults[nameA] || {});
      html += '<span class="round-vs">VS</span>';
      html += roundSideEditable(nameB, teamOf[nameB] || {}, prevResults[nameB] || {});
      html += '</div></div>';
    });

    html += '<div class="submit-row"><div class="submit-btn-row">' +
      '<button class="btn btn-primary" id="submitBtn">점수 등록하기</button>' +
      '<button class="btn btn-danger" id="deleteBtn">이 달 데이터 삭제</button>' +
      '</div><span class="submit-note" id="submitNote"></span></div>';

    contentEl.innerHTML = html;
    bindScoreInputs(draft);
    updateSubmitState();
    document.getElementById("submitBtn").addEventListener("click", function () { submitScores(draft); });
    document.getElementById("deleteBtn").addEventListener("click", function () { deleteMonth(draft.yearMonth); });
  }

  function roundSideEditable(name, team, prev) {
    var safeName = escapeHtml(name);
    var inputName = "score__" + encodeURIComponent(name);
    var val = (prev && typeof prev.score === "number") ? prev.score : "";
    var dis = unlocked ? "" : "disabled";
    return '<div class="round-side" style="--team-color:' + (team.color || "var(--accent)") + '">' +
      '<span class="dot"></span><span class="name">' + safeName + '</span>' +
      '<input type="number" class="score-input" name="' + inputName + '" min="0" step="1" inputmode="numeric" value="' + escapeHtml(val) + '" ' + dis + ' />' +
      '<span class="badge none" data-badge-for="' + inputName + '">미입력</span>' +
      '</div>';
  }

  function bindScoreInputs(draft) {
    draft.pairs.forEach(function (pair) {
      var nameA = pair[0], nameB = pair[1];
      var inputA = document.querySelector('input[name="score__' + encodeURIComponent(nameA) + '"]');
      var inputB = document.querySelector('input[name="score__' + encodeURIComponent(nameB) + '"]');
      if (!inputA || !inputB) return;
      function refresh() {
        inputA.value = inputA.value.replace(/[^0-9]/g, "");
        inputB.value = inputB.value.replace(/[^0-9]/g, "");
        updateRoundBadges(nameA, inputA, nameB, inputB);
      }
      inputA.addEventListener("input", refresh);
      inputB.addEventListener("input", refresh);
      updateRoundBadges(nameA, inputA, nameB, inputB);
    });
  }

  function updateRoundBadges(nameA, inputA, nameB, inputB) {
    var badgeA = document.querySelector('[data-badge-for="score__' + encodeURIComponent(nameA) + '"]');
    var badgeB = document.querySelector('[data-badge-for="score__' + encodeURIComponent(nameB) + '"]');
    var a = inputA.value !== "" ? parseInt(inputA.value, 10) : null;
    var b = inputB.value !== "" ? parseInt(inputB.value, 10) : null;
    var outcomeA = null, outcomeB = null;
    if (a !== null && b !== null && !isNaN(a) && !isNaN(b)) {
      if (a > b) { outcomeA = "win"; outcomeB = "loss"; }
      else if (a < b) { outcomeA = "loss"; outcomeB = "win"; }
      else { outcomeA = "draw"; outcomeB = "draw"; }
    }
    setBadge(badgeA, outcomeA);
    setBadge(badgeB, outcomeB);
  }

  function updateSubmitState() {
    var btn = document.getElementById("submitBtn");
    var delBtn = document.getElementById("deleteBtn");
    var note = document.getElementById("submitNote");
    if (!btn) return;
    btn.disabled = !unlocked;
    if (delBtn) delBtn.disabled = !unlocked;
    note.textContent = unlocked
      ? "두 선수의 점수를 모두 입력한 라운드만 반영돼요."
      : "위에서 비밀번호를 입력해야 등록/삭제할 수 있어요.";
  }

  function renderSummary(draft) {
    var teamOf = memberTeamMap(draft);
    var html = draft.yearMonth ? '<p class="draft-meta">' + escapeHtml(draft.yearMonth) + ' 드래프트</p>' : "";

    draft.pairs.forEach(function (pair, idx) {
      var nameA = pair[0], nameB = pair[1];
      var label = positionLabel(idx, draft.pairs.length);
      var rA = (draft.results && draft.results[nameA]) || {};
      var rB = (draft.results && draft.results[nameB]) || {};
      html += '<div class="panel round-card">';
      html += '<p class="round-label">' + escapeHtml(label) + '</p>';
      html += '<div class="round-match">';
      html += roundSideReadonly(nameA, teamOf[nameA] || {}, rA);
      html += '<span class="round-vs">VS</span>';
      html += roundSideReadonly(nameB, teamOf[nameB] || {}, rB);
      html += '</div></div>';
    });

    html += '<div class="submit-row"><button class="link-btn" id="rescoreBtn">다시 채점하기 ›</button></div>';
    contentEl.innerHTML = html;
    document.getElementById("rescoreBtn").addEventListener("click", function () {
      reScoring = true;
      renderContent();
    });
  }

  function roundSideReadonly(name, team, r) {
    var safeName = escapeHtml(name);
    var outcome = r.outcome || "none";
    var scoreText = (typeof r.score === "number") ? r.score : "-";
    return '<div class="round-side" style="--team-color:' + (team.color || "var(--accent)") + '">' +
      '<span class="dot"></span><span class="name">' + safeName + '</span>' +
      '<span class="score-value">' + escapeHtml(scoreText) + '</span>' +
      '<span class="badge ' + outcome + '">' + (outcome === "win" ? "승" : outcome === "loss" ? "패" : outcome === "draw" ? "무" : "미입력") + '</span>' +
      '</div>';
  }

  async function fetchLatestState() {
    var res = await fetch(FIREBASE_URL + STATE_PATH + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) return null;
    var data = await res.json();
    if (!data) data = { playerStats: {}, headToHead: {}, drafts: {}, latestDraft: null };
    if (!data.headToHead) data.headToHead = {};
    if (!data.playerStats) data.playerStats = {};
    if (!data.drafts) data.drafts = {};
    return { data: data };
  }

  // pairs: [[nameX, nameY], ...], resultsMap: { name: {outcome, score, pom} }, sign: +1 apply / -1 reverse
  function applyHeadToHeadDelta(pairs, resultsMap, sign, headToHead) {
    if (!pairs || !pairs.length) return;
    pairs.forEach(function (pair) {
      var nameX = pair[0], nameY = pair[1];
      var rx = resultsMap[nameX], ry = resultsMap[nameY];
      if (!rx || !ry || !rx.outcome || !ry.outcome) return;
      var key = nameX + "|" + nameY;
      var altKey = nameY + "|" + nameX;
      var rec = headToHead[key] || headToHead[altKey];
      if (!rec) {
        rec = { a: nameX, b: nameY, aWin: 0, bWin: 0, draw: 0 };
        headToHead[key] = rec;
      }
      var aIsX = (rec.a === nameX);
      if (rx.outcome === "draw" && ry.outcome === "draw") {
        rec.draw = Math.max(0, rec.draw + sign);
      } else if (rx.outcome === "win" && ry.outcome === "loss") {
        if (aIsX) rec.aWin = Math.max(0, rec.aWin + sign); else rec.bWin = Math.max(0, rec.bWin + sign);
      } else if (rx.outcome === "loss" && ry.outcome === "win") {
        if (aIsX) rec.bWin = Math.max(0, rec.bWin + sign); else rec.aWin = Math.max(0, rec.aWin + sign);
      }
      // 그 외 조합(둘 다 승/패, 한쪽만 입력 등)은 상대전적이 애매해지므로 건너뜀
    });
  }

  async function submitScores(localDraft) {
    if (!unlocked) return;
    var note = document.getElementById("submitNote");
    note.textContent = "등록하는 중…";

    try {
      var fresh = await fetchLatestState();
      if (!fresh) {
        note.textContent = "등록 실패 (최신 데이터를 불러오지 못했어요).";
        return;
      }
      var draftsMap = collectDrafts(fresh.data);
      var draft = draftsMap[selectedYearMonth];
      if (!draft) {
        note.textContent = "등록 실패 (드래프트를 찾을 수 없어요).";
        return;
      }
      var playerStats = fresh.data.playerStats || {};
      var headToHead = fresh.data.headToHead || {};
      var oldResults = draft.results || {};

      // raw 데이터(승/패/무)만 이 페이지에서 관리한다 — POM은 별도 페이지 소관이므로
      // 기존에 기록된 pom 플래그가 있다면 지우지 않고 그대로 들고 간다.
      if (draft.scored && oldResults) {
        Object.keys(oldResults).forEach(function (name) {
          var r = oldResults[name];
          var s = playerStats[name];
          if (!s || !r.outcome) return;
          if (r.outcome === "win") s.win = Math.max(0, s.win - 1);
          else if (r.outcome === "loss") s.loss = Math.max(0, s.loss - 1);
          else if (r.outcome === "draw") s.draw = Math.max(0, s.draw - 1);
        });
        applyHeadToHeadDelta(draft.pairs, oldResults, -1, headToHead);
      }

      var newResults = {};
      draft.pairs.forEach(function (pair) {
        var nameA = pair[0], nameB = pair[1];
        var inputA = document.querySelector('input[name="score__' + encodeURIComponent(nameA) + '"]');
        var inputB = document.querySelector('input[name="score__' + encodeURIComponent(nameB) + '"]');
        if (!inputA || !inputB) return;
        var a = inputA.value !== "" ? parseInt(inputA.value, 10) : null;
        var b = inputB.value !== "" ? parseInt(inputB.value, 10) : null;
        if (a === null || b === null || isNaN(a) || isNaN(b)) return;
        var outcomeA, outcomeB;
        if (a > b) { outcomeA = "win"; outcomeB = "loss"; }
        else if (a < b) { outcomeA = "loss"; outcomeB = "win"; }
        else { outcomeA = "draw"; outcomeB = "draw"; }
        newResults[nameA] = { score: a, outcome: outcomeA };
        newResults[nameB] = { score: b, outcome: outcomeB };

        [[nameA, outcomeA], [nameB, outcomeB]].forEach(function (pairInfo) {
          var name = pairInfo[0], outcome = pairInfo[1];
          if (!playerStats[name]) playerStats[name] = { win: 0, loss: 0, draw: 0, pom: 0 };
          if (outcome === "win") playerStats[name].win++;
          else if (outcome === "loss") playerStats[name].loss++;
          else if (outcome === "draw") playerStats[name].draw++;
        });
      });

      // 이전에 기록돼 있던 pom 플래그는 이 페이지가 건드리지 않고 그대로 보존한다.
      allMembers(draft).forEach(function (m) {
        var old = oldResults[m.name];
        if (old && old.pom) {
          if (!newResults[m.name]) newResults[m.name] = {};
          newResults[m.name].pom = true;
        }
      });

      applyHeadToHeadDelta(draft.pairs, newResults, 1, headToHead);

      draft.scored = Object.keys(newResults).some(function (name) { return newResults[name].outcome; });
      draft.results = newResults;

      fresh.data.drafts[selectedYearMonth] = draft;
      fresh.data.playerStats = playerStats;
      fresh.data.headToHead = headToHead;

      var putRes = await fetch(FIREBASE_URL + STATE_PATH, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(fresh.data)
      });

      if (putRes.ok) {
        window.location.href = "result.html?ym=" + encodeURIComponent(selectedYearMonth);
      } else {
        note.textContent = "등록 실패 (네트워크 오류).";
      }
    } catch (e) {
      note.textContent = "등록 실패 (네트워크 오류).";
    }
  }

  async function deleteMonth(yearMonth) {
    if (!unlocked) return;
    if (!window.confirm(yearMonth + " 데이터를 삭제할까요? 되돌릴 수 없어요.")) return;

    var note = document.getElementById("submitNote");
    note.textContent = "삭제하는 중…";

    try {
      var fresh = await fetchLatestState();
      if (!fresh) {
        note.textContent = "삭제 실패 (최신 데이터를 불러오지 못했어요).";
        return;
      }
      var draftsMap = collectDrafts(fresh.data);
      var draft = draftsMap[yearMonth];
      if (!draft) {
        note.textContent = "삭제 실패 (드래프트를 찾을 수 없어요).";
        return;
      }
      var playerStats = fresh.data.playerStats || {};
      var headToHead = fresh.data.headToHead || {};

      if (draft.scored && draft.results) {
        Object.keys(draft.results).forEach(function (name) {
          var r = draft.results[name];
          var s = playerStats[name];
          if (!s || !r.outcome) return;
          if (r.outcome === "win") s.win = Math.max(0, s.win - 1);
          else if (r.outcome === "loss") s.loss = Math.max(0, s.loss - 1);
          else if (r.outcome === "draw") s.draw = Math.max(0, s.draw - 1);
        });
        applyHeadToHeadDelta(draft.pairs, draft.results, -1, headToHead);
      }

      if (fresh.data.drafts) delete fresh.data.drafts[yearMonth];
      if (fresh.data.latestDraft && fresh.data.latestDraft.yearMonth === yearMonth) {
        fresh.data.latestDraft = null;
      }
      fresh.data.playerStats = playerStats;
      fresh.data.headToHead = headToHead;

      var putRes = await fetch(FIREBASE_URL + STATE_PATH, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(fresh.data)
      });

      if (putRes.ok) {
        stateData = fresh.data;
        selectedYearMonth = null;
        reScoring = false;
        renderMonthPanel();
        renderContent();
      } else {
        note.textContent = "삭제 실패 (네트워크 오류).";
      }
    } catch (e) {
      note.textContent = "삭제 실패 (네트워크 오류).";
    }
  }

  loadState();
})();
</script>
